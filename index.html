<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Red Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, signOut, updateProfile,
      GoogleAuthProvider, signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc,
      getDoc, setDoc, updateDoc, deleteDoc, query, orderBy,
      onSnapshot, where, serverTimestamp, increment,
      arrayUnion, arrayRemove, limit, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ══════════════════════════════════════════
    //  🔧 REEMPLAZA CON TU FIREBASE CONFIG
    // ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyARcjrWOLq9l1AyvOkPHsb4YSZvO66lT5g",
  authDomain: "nexus-social-9dcf2.firebaseapp.com",
  projectId: "nexus-social-9dcf2",
  storageBucket: "nexus-social-9dcf2.firebasestorage.app",
  messagingSenderId: "1037219652720",
  appId: "1:1037219652720:web:7a5481847b4c8749d980b5"
};
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const goog = new GoogleAuthProvider();

    // ─── STATE ──────────────────────────────────
    let ME = null;
    let meData = {};
    let view = "feed";
    let feedTab = "popular";
    let activeChatId = null;
    let activeOtherName = "";
    let activeOtherId = "";
    let unsubFeed = null;
    let unsubMsgs = null;
    let unsubRequests = null;
    let unsubChats = null;

    // ─── HELPERS ────────────────────────────────
    const $   = id => document.getElementById(id);
    const esc = s  => s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : "";
    const show = id => $(id) && ($(id).style.display = "");
    const hide = id => $(id) && ($(id).style.display = "none");
    const set  = (id,t) => $(id) && ($(id).textContent = t);
    const inn  = (id,h) => $(id) && ($(id).innerHTML = h);
    const avStyle = p => p ? `background-image:url('${esc(p)}');background-size:cover;background-position:center;font-size:0` : "";
    const avLetter = (name, photo) => photo ? "" : (name||"?")[0].toUpperCase();
    const tsFormat = ts => ts ? new Date(ts.seconds*1000).toLocaleDateString("es",{day:"numeric",month:"short"}) : "";

    // ─── EXPOSE GLOBALS ─────────────────────────
    Object.assign(window, {
      switchAuthTab, doLogin, doRegister, loginGoogle,
      goView, openPostModal, closePostModal, submitPost,
      likePost, openPost, addComment, setFeedTab,
      openChatWith, openChatRoom, sendMessage,
      acceptRequest, declineRequest, openNewChatModal,
      saveProfile, doLogout, visitProfile,
      followUser, unfollowUser, showFollowModal, closeFollowModal,
      showChatTab, previewPhoto, closeMobileNav, toggleMobileNav,
      closeRequestNotif
    });

    // ══════════════════════════════════════════
    //  AUTH
    // ══════════════════════════════════════════
    onAuthStateChanged(auth, async user => {
      if (user) {
        ME = user;
        const isNew = !(await getDoc(doc(db,"users",user.uid))).exists();
        meData = await ensureUserDoc(user);
        renderApp();
        listenRequests();
        if(isNew) await sendWelcomeRequest(user);
      } else {
        ME = null;
        renderAuth();
      }
    });

    async function ensureUserDoc(user) {
      const ref  = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        const data = {
          uid: user.uid,
          displayName: user.displayName || user.email.split("@")[0],
          email: user.email,
          photoURL: user.photoURL || "",
          bio: "",
          followers: [],
          following: [],
          createdAt: serverTimestamp()
        };
        await setDoc(ref, data);
        return data;
      }
      return snap.data();
    }

    // ─── Solicitud de bienvenida al registrarse ───
    async function sendWelcomeRequest(user) {
      // Busca a otro usuario existente (distinto al recién registrado) para mandarle una "solicitud de bienvenida"
      const q = query(collection(db,"users"), limit(5));
      const snap = await getDocs(q);
      const others = snap.docs.filter(d=>d.id!==user.uid);
      if(!others.length) return;
      // Tomamos el primero como "sistema/bienvenida"
      const other = others[0].data();
      const cid = chatId(other.uid, user.uid);
      const existing = await getDoc(doc(db,"chatRequests",cid));
      if(existing.exists()) return;
      await setDoc(doc(db,"chatRequests",cid), {
        from: other.uid,
        fromName: other.displayName||other.email,
        fromPhoto: other.photoURL||"",
        to: user.uid,
        toName: user.displayName||user.email,
        status: "pending",
        isWelcome: true,
        createdAt: serverTimestamp()
      });
    }

    function renderAuth() {
      document.body.innerHTML = `
      <div class="auth-bg">
        <div class="auth-card">
          <div class="auth-logo">NEXUS</div>
          <p class="auth-sub">Tu espacio sin filtros</p>
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Entrar</button>
            <button class="auth-tab" id="tab-reg" onclick="switchAuthTab('reg')">Registrarse</button>
          </div>
          <div id="auth-body">${loginHTML()}</div>
          <div class="or-divider"><span>o</span></div>
          <button class="btn-google" onclick="loginGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continuar con Google
          </button>
          <p class="auth-err" id="auth-err"></p>
        </div>
      </div>`;
    }

    const loginHTML = () => `
      <input class="inp" id="a-email" type="email" placeholder="Correo electrónico"/>
      <input class="inp" id="a-pass" type="password" placeholder="Contraseña"/>
      <button class="btn-primary w100" onclick="doLogin()">Entrar</button>`;

    const regHTML = () => `
      <input class="inp" id="a-name" type="text" placeholder="Nombre de usuario"/>
      <input class="inp" id="a-email" type="email" placeholder="Correo electrónico"/>
      <input class="inp" id="a-pass" type="password" placeholder="Contraseña (mín. 6)"/>
      <button class="btn-primary w100" onclick="doRegister()">Crear cuenta</button>`;

    function switchAuthTab(t) {
      document.querySelectorAll(".auth-tab").forEach(x=>x.classList.remove("active"));
      $(`tab-${t}`).classList.add("active");
      inn("auth-body", t==="login" ? loginHTML() : regHTML());
    }
    async function doLogin() {
      const err = $("auth-err");
      try { await signInWithEmailAndPassword(auth, $("a-email").value, $("a-pass").value); }
      catch(e) { if(err) err.textContent = friendlyAuthError(e.code); }
    }
    async function doRegister() {
      const err = $("auth-err");
      try {
        const name = $("a-name").value.trim();
        if(!name){ if(err) err.textContent="El nombre es requerido"; return; }
        const c = await createUserWithEmailAndPassword(auth, $("a-email").value, $("a-pass").value);
        await updateProfile(c.user, { displayName: name });
      } catch(e) { if(err) err.textContent = friendlyAuthError(e.code); }
    }
    async function loginGoogle() {
      try { await signInWithPopup(auth, goog); }
      catch(e) { if($("auth-err")) $("auth-err").textContent = friendlyAuthError(e.code); }
    }
    function friendlyAuthError(code) {
      const m = {
        "auth/invalid-email":"Correo inválido",
        "auth/user-not-found":"Usuario no encontrado",
        "auth/wrong-password":"Contraseña incorrecta",
        "auth/email-already-in-use":"Ese correo ya está registrado",
        "auth/weak-password":"La contraseña es muy débil",
        "auth/too-many-requests":"Demasiados intentos. Espera unos minutos"
      };
      return m[code]||"Error de autenticación";
    }

    // ══════════════════════════════════════════
    //  APP SHELL
    // ══════════════════════════════════════════
    function renderApp() {
      const u = ME;
      document.body.innerHTML = `
      <!-- Mobile top bar -->
      <div class="mobile-topbar">
        <button class="hamburger" onclick="toggleMobileNav()" id="hamburger-btn">
          <span></span><span></span><span></span>
        </button>
        <div class="auth-logo" style="font-size:20px">NEXUS</div>
        <button class="btn-icon" onclick="openPostModal()" style="border:none;background:var(--accent);color:#fff;border-radius:8px;width:34px;height:34px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <!-- Mobile overlay -->
      <div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileNav()"></div>

      <div class="app">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-logo">NEXUS</div>
          <nav class="sidebar-nav">
            <a class="nav-item active" id="nav-feed" onclick="goView('feed');closeMobileNav()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Inicio
            </a>
            <a class="nav-item" id="nav-chat" onclick="goView('chat');closeMobileNav()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              Mensajes
              <span class="badge" id="req-badge" style="display:none">!</span>
            </a>
            <a class="nav-item" id="nav-profile" onclick="goView('profile');closeMobileNav()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Mi Perfil
            </a>
          </nav>
          <button class="btn-new-post" onclick="openPostModal();closeMobileNav()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva Publicación
          </button>
          <div class="sidebar-user" onclick="goView('profile');closeMobileNav()">
            <div class="avatar sm" id="sb-av" style="${avStyle(u.photoURL)}">${avLetter(u.displayName||u.email, u.photoURL)}</div>
            <div style="flex:1;min-width:0">
              <div class="sb-name" id="sb-name">${esc(u.displayName||u.email)}</div>
              <div class="sb-email">${esc(u.email)}</div>
            </div>
            <button class="btn-logout" onclick="event.stopPropagation();doLogout()" title="Salir">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </aside>
        <main class="main" id="main"></main>

        <!-- Post Modal -->
        <div class="overlay" id="post-modal" style="display:none" onclick="if(event.target===this)closePostModal()">
          <div class="modal-box">
            <div class="modal-hd">
              <h3>Nueva Publicación</h3>
              <button class="btn-x" onclick="closePostModal()">✕</button>
            </div>
            <textarea class="txtarea" id="p-content" placeholder="¿Qué está pasando?" oninput="$('p-cc').textContent=this.value.length+'/500'"></textarea>
            <input class="inp" id="p-img" type="url" placeholder="URL de imagen (opcional)"/>
            <div class="modal-ft">
              <span class="subtle sm" id="p-cc">0/500</span>
              <button class="btn-primary" onclick="submitPost()">Publicar</button>
            </div>
          </div>
        </div>

        <!-- Follow Modal -->
        <div class="overlay" id="follow-modal" style="display:none" onclick="if(event.target===this)closeFollowModal()">
          <div class="modal-box" style="max-height:70vh;overflow-y:auto">
            <div class="modal-hd">
              <h3 id="follow-modal-title">Seguidores</h3>
              <button class="btn-x" onclick="closeFollowModal()">✕</button>
            </div>
            <div id="follow-modal-list" style="margin-top:10px"></div>
          </div>
        </div>

        <!-- Request Notification Toast -->
        <div id="request-notif" class="request-notif" style="display:none"></div>
      </div>`;

      goView("feed");
    }

    function toggleMobileNav() {
      const sidebar = $("sidebar");
      const overlay = $("mobile-overlay");
      sidebar.classList.toggle("open");
      overlay.classList.toggle("active");
    }
    function closeMobileNav() {
      $("sidebar")?.classList.remove("open");
      $("mobile-overlay")?.classList.remove("active");
    }

    function goView(v) {
      view = v;
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      const ni = $(`nav-${["post-detail","other-profile"].includes(v)?"feed":v}`);
      if(ni) ni.classList.add("active");
      if(v==="feed")         renderFeed();
      else if(v==="chat")    renderChatView();
      else if(v==="profile") renderMyProfile();
    }

    // ══════════════════════════════════════════
    //  FEED + ADS
    // ══════════════════════════════════════════
    const adTemplates = [
      { label:"Patrocinado", title:"¿Quieres crecer en redes?", body:"Llega a miles de personas con Nexus Ads. Empieza hoy.", cta:"Ver más", color:"#7c4dff" },
      { label:"Anuncio", title:"Descuentos exclusivos", body:"Accede a ofertas únicas de marcas que confían en Nexus.", cta:"Explorar", color:"#00c6ff" },
      { label:"Patrocinado", title:"Nexus Premium", body:"Desbloquea estadísticas avanzadas, temas y más funciones.", cta:"Pruébalo gratis", color:"#ff6b6b" },
    ];

    function adCard(idx) {
      const ad = adTemplates[idx % adTemplates.length];
      return `<div class="ad-card">
        <div class="ad-label">${ad.label}</div>
        <div class="ad-body">
          <div class="ad-icon" style="background:${ad.color}20;color:${ad.color}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="ad-text">
            <div class="ad-title">${ad.title}</div>
            <div class="ad-desc">${ad.body}</div>
          </div>
        </div>
        <button class="ad-cta" style="border-color:${ad.color};color:${ad.color}">${ad.cta} →</button>
      </div>`;
    }

    function renderFeed() {
      inn("main", `
        <div class="page-hd">
          <h2>Descubrir</h2>
          <div class="tab-row">
            <button class="tab ${feedTab==="popular"?"active":""}" id="ft-popular" onclick="setFeedTab('popular')">🔥 Populares</button>
            <button class="tab ${feedTab==="recent"?"active":""}" id="ft-recent" onclick="setFeedTab('recent')">🕒 Recientes</button>
          </div>
        </div>
        <div id="posts-wrap"></div>`);
      loadFeed();
    }

    function setFeedTab(t) {
      feedTab = t;
      document.querySelectorAll(".tab-row .tab").forEach(x=>x.classList.remove("active"));
      $(`ft-${t}`)?.classList.add("active");
      loadFeed();
    }

    function loadFeed() {
      if(!ME || view!=="feed") return;
      if(unsubFeed) unsubFeed();
      const col = collection(db,"posts");
      const q = feedTab==="popular"
        ? query(col, orderBy("score","desc"), limit(60))
        : query(col, orderBy("createdAt","desc"), limit(60));
      unsubFeed = onSnapshot(q, snap => {
        if(!$("posts-wrap")) return;
        const posts = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(!posts.length){
          inn("posts-wrap",`<div class="empty"><div class="ei">🌌</div><p>Sin publicaciones aún. ¡Sé el primero!</p></div>`);
          return;
        }
        // Intercalar anuncio cada 3 posts
        let html = "";
        let adIdx = 0;
        posts.forEach((p, i) => {
          html += postCard(p);
          if((i+1) % 3 === 0) {
            html += adCard(adIdx++);
          }
        });
        inn("posts-wrap", html);
      });
    }

    function postCard(p) {
      const liked = (p.likes||[]).includes(ME.uid);
      const ts = tsFormat(p.createdAt);
      const mine = p.authorId===ME.uid;
      return `<div class="post-card" id="pc-${p.id}">
        <div class="post-hd">
          <div class="avatar" style="${avStyle(p.authorPhoto)}" onclick="visitProfile('${esc(p.authorId)}')">${avLetter(p.authorName, p.authorPhoto)}</div>
          <div style="flex:1;min-width:0">
            <div class="post-author" onclick="visitProfile('${esc(p.authorId)}')">${esc(p.authorName||"Anónimo")}</div>
            <div class="post-time">${ts}</div>
          </div>
          ${mine?`<button class="act-btn" onclick="deletePost('${p.id}')" style="margin-left:auto;border-color:rgba(255,82,82,.2);color:var(--danger)" title="Eliminar">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>`:""}
        </div>
        <div class="post-body">${esc(p.content||"")}</div>
        ${p.imageUrl?`<div class="post-img-wrap"><img src="${esc(p.imageUrl)}" onclick="openPost('${p.id}')" alt="" loading="lazy"/></div>`:""}
        <div class="post-actions">
          <button class="act-btn ${liked?"liked":""}" onclick="likePost('${p.id}',${liked})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="${liked?"currentColor":"none"}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            ${(p.likes||[]).length}
          </button>
          <button class="act-btn" onclick="openPost('${p.id}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            ${p.commentCount||0}
          </button>
          ${!mine?`<button class="act-btn" onclick="openChatWith('${esc(p.authorId)}','${esc(p.authorName||"Usuario")}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Mensaje
          </button>`:""}
        </div>
      </div>`;
    }

    async function deletePost(pid) {
      if(!confirm("¿Eliminar esta publicación?")) return;
      await deleteDoc(doc(db,"posts",pid));
    }

    async function likePost(id, liked) {
      await updateDoc(doc(db,"posts",id), {
        likes: liked ? arrayRemove(ME.uid) : arrayUnion(ME.uid),
        score: increment(liked ? -1 : 1)
      });
    }

    // ─── POST DETAIL ──────────────────────────────
    async function openPost(pid) {
      view = "post-detail";
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      $("nav-feed")?.classList.add("active");
      inn("main", `<div class="loader-txt">Cargando...</div>`);
      const snap = await getDoc(doc(db,"posts",pid));
      if(!snap.exists()){ inn("main","<p class='subtle'>Post no encontrado</p>"); return; }
      const p = {id:snap.id,...snap.data()};
      inn("main", `
        <button class="back-btn" onclick="goView('feed')">← Volver</button>
        ${postCard(p)}
        <div class="comments-box">
          <h4>Comentarios</h4>
          <div class="cmt-input-row">
            <div class="avatar sm" style="${avStyle(meData.photoURL||ME.photoURL)}">${avLetter(ME.displayName, meData.photoURL||ME.photoURL)}</div>
            <input class="inp" id="cmt-txt" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter')addComment('${pid}')"/>
            <button class="btn-primary sm" onclick="addComment('${pid}')">Enviar</button>
          </div>
          <div id="cmts-list"><div class="loader-txt">Cargando...</div></div>
        </div>`);
      loadComments(pid);
    }

    function loadComments(pid) {
      const q = query(collection(db,"posts",pid,"comments"), orderBy("createdAt","asc"));
      onSnapshot(q, snap => {
        if(!$("cmts-list")) return;
        const cs = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(!cs.length){ inn("cmts-list",`<p class="subtle" style="padding:16px 0">Sin comentarios aún.</p>`); return; }
        inn("cmts-list", cs.map(c=>`
          <div class="cmt">
            <div class="avatar sm" style="${avStyle(c.authorPhoto)}" onclick="visitProfile('${esc(c.authorId)}')">${avLetter(c.authorName,c.authorPhoto)}</div>
            <div><span class="cmt-name" onclick="visitProfile('${esc(c.authorId)}')">${esc(c.authorName||"?")}</span> <span class="cmt-body">${esc(c.content)}</span></div>
          </div>`).join(""));
      });
    }

    async function addComment(pid) {
      const inp = $("cmt-txt");
      const t   = inp?.value.trim();
      if(!t) return;
      inp.value = "";
      await addDoc(collection(db,"posts",pid,"comments"), {
        content: t,
        authorId: ME.uid,
        authorName: ME.displayName||ME.email,
        authorPhoto: meData.photoURL||ME.photoURL||"",
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db,"posts",pid), { commentCount: increment(1), score: increment(2) });
    }

    // ─── POST MODAL ───────────────────────────────
    function openPostModal()  { show("post-modal"); }
    function closePostModal() { hide("post-modal"); }

    async function submitPost() {
      const content = $("p-content")?.value.trim();
      const imgUrl  = $("p-img")?.value.trim();
      if(!content) return;
      await addDoc(collection(db,"posts"), {
        content, imageUrl: imgUrl||"",
        authorId: ME.uid,
        authorName: ME.displayName||ME.email,
        authorPhoto: meData.photoURL||ME.photoURL||"",
        likes:[], commentCount:0, score:0,
        createdAt: serverTimestamp()
      });
      $("p-content").value = ""; $("p-img").value = "";
      closePostModal();
      feedTab = "recent";
      goView("feed");
    }

    // ══════════════════════════════════════════
    //  VISIT OTHER PROFILES
    // ══════════════════════════════════════════
    async function visitProfile(uid) {
      if(!uid) return;
      if(uid===ME.uid){ goView("profile"); return; }
      view = "other-profile";
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      inn("main", `<div class="loader-txt">Cargando perfil...</div>`);

      const [uSnap, meSnap] = await Promise.all([
        getDoc(doc(db,"users",uid)),
        getDoc(doc(db,"users",ME.uid))
      ]);
      if(!uSnap.exists()){ inn("main","<p class='subtle' style='padding:40px'>Usuario no encontrado</p>"); return; }
      const u  = uSnap.data();
      meData   = meSnap.data()||meData;
      const amF = (meData.following||[]).includes(uid);

      const postsSnap = await getDocs(query(collection(db,"posts"), where("authorId","==",uid), orderBy("createdAt","desc"), limit(30)));
      const posts = postsSnap.docs.map(d=>({id:d.id,...d.data()}));

      inn("main", `
        <button class="back-btn" onclick="history.back()">← Volver</button>
        <div class="profile-hero">
          <div class="avatar xl" style="${avStyle(u.photoURL)}">${avLetter(u.displayName||u.email, u.photoURL)}</div>
          <div class="profile-info">
            <h2>${esc(u.displayName||u.email)}</h2>
            <p class="subtle" style="font-size:13px">${esc(u.email)}</p>
            <p class="profile-bio" style="margin-top:6px">${esc(u.bio||"Sin bio")}</p>
            <div class="follow-stats">
              <span class="follow-stat-btn" onclick="showFollowModal('${uid}','followers')"><strong>${(u.followers||[]).length}</strong> seguidores</span>
              <span class="follow-stat-btn" onclick="showFollowModal('${uid}','following')"><strong>${(u.following||[]).length}</strong> siguiendo</span>
            </div>
            <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
              ${amF
                ? `<button class="btn-secondary" onclick="unfollowUser('${uid}')">✓ Siguiendo</button>`
                : `<button class="btn-primary sm" onclick="followUser('${uid}','${esc(u.displayName||u.email)}')">+ Seguir</button>`}
              <button class="btn-secondary" onclick="openChatWith('${uid}','${esc(u.displayName||u.email)}')">💬 Mensaje privado</button>
            </div>
          </div>
        </div>
        <h4 style="margin:22px 0 12px;font-family:'Syne',sans-serif">Publicaciones</h4>
        ${posts.length ? posts.map(postCard).join("") : `<div class="empty"><p>Sin publicaciones aún</p></div>`}`);
    }

    async function followUser(uid) {
      await Promise.all([
        updateDoc(doc(db,"users",ME.uid), { following: arrayUnion(uid) }),
        updateDoc(doc(db,"users",uid),    { followers: arrayUnion(ME.uid) })
      ]);
      meData.following = [...(meData.following||[]), uid];
      visitProfile(uid);
    }
    async function unfollowUser(uid) {
      await Promise.all([
        updateDoc(doc(db,"users",ME.uid), { following: arrayRemove(uid) }),
        updateDoc(doc(db,"users",uid),    { followers: arrayRemove(ME.uid) })
      ]);
      meData.following = (meData.following||[]).filter(x=>x!==uid);
      visitProfile(uid);
    }

    async function showFollowModal(uid, type) {
      show("follow-modal");
      set("follow-modal-title", type==="followers" ? "Seguidores" : "Siguiendo");
      inn("follow-modal-list", `<div class="loader-txt">Cargando...</div>`);
      const snap = await getDoc(doc(db,"users",uid));
      const udata = snap.data();
      const ids = type==="followers" ? (udata.followers||[]) : (udata.following||[]);
      if(!ids.length){ inn("follow-modal-list",`<p class="subtle" style="padding:8px">Nadie aquí aún.</p>`); return; }
      const users = await Promise.all(ids.map(id=>getDoc(doc(db,"users",id))));
      inn("follow-modal-list", users.map(s=>{
        if(!s.exists()) return "";
        const u = s.data();
        return `<div class="follow-row" onclick="closeFollowModal();visitProfile('${esc(u.uid)}')">
          <div class="avatar sm" style="${avStyle(u.photoURL)}">${avLetter(u.displayName||u.email, u.photoURL)}</div>
          <div>
            <div style="font-weight:600;font-size:13px">${esc(u.displayName||u.email)}</div>
            <div class="subtle" style="font-size:11px">${esc(u.email)}</div>
          </div>
        </div>`;
      }).join(""));
    }
    function closeFollowModal() { hide("follow-modal"); }

    // ══════════════════════════════════════════
    //  CHAT  +  SOLICITUDES
    // ══════════════════════════════════════════
    const chatId = (a,b) => [a,b].sort().join("__");

    async function openChatWith(otherId, otherName) {
      if(!otherId || otherId===ME.uid) return;
      activeOtherId   = otherId;
      activeOtherName = otherName;
      const cid = chatId(ME.uid, otherId);

      const [chatSnap, reqSnap] = await Promise.all([
        getDoc(doc(db,"chats",cid)),
        getDoc(doc(db,"chatRequests",cid))
      ]);

      if(chatSnap.exists() && chatSnap.data().accepted) {
        goView("chat");
        setTimeout(()=>openChatRoom(cid, otherName, otherId), 120);
      } else if(reqSnap.exists()) {
        const req = reqSnap.data();
        if(req.from===ME.uid){
          showToast(`Ya enviaste una solicitud a ${otherName}. Espera que la acepte.`);
        } else {
          if(confirm(`${otherName} ya te envió una solicitud. ¿Aceptar ahora?`)) {
            await acceptRequest(cid, req.from, req.fromName);
          }
        }
      } else {
        if(confirm(`¿Enviar solicitud de chat a ${otherName}?`)) {
          await setDoc(doc(db,"chatRequests",cid), {
            from: ME.uid, fromName: ME.displayName||ME.email, fromPhoto: meData.photoURL||ME.photoURL||"",
            to: otherId, toName: otherName,
            status: "pending", isWelcome: false,
            createdAt: serverTimestamp()
          });
          showToast(`✅ Solicitud enviada a ${otherName}`);
        }
      }
    }

    async function acceptRequest(reqId, fromId, fromName) {
      const cid = chatId(ME.uid, fromId);
      const fromSnap = await getDoc(doc(db,"users",fromId));
      const fromPhoto = fromSnap.exists() ? (fromSnap.data().photoURL||"") : "";
      await setDoc(doc(db,"chats",cid), {
        members: [ME.uid, fromId],
        memberNames:  { [ME.uid]: ME.displayName||ME.email, [fromId]: fromName },
        memberPhotos: { [ME.uid]: meData.photoURL||ME.photoURL||"", [fromId]: fromPhoto },
        accepted: true,
        lastMessage: "",
        lastMessageAt: serverTimestamp()
      });
      await deleteDoc(doc(db,"chatRequests",reqId));
      activeOtherId   = fromId;
      activeOtherName = fromName;
      activeChatId    = cid;
      goView("chat");
      setTimeout(()=>openChatRoom(cid, fromName, fromId), 150);
    }

    async function declineRequest(reqId) {
      await deleteDoc(doc(db,"chatRequests",reqId));
      if(view==="chat") loadRequestList();
    }

    function listenRequests() {
      if(unsubRequests) unsubRequests();
      const q = query(collection(db,"chatRequests"), where("to","==",ME.uid), where("status","==","pending"));
      unsubRequests = onSnapshot(q, snap => {
        const n = snap.docs.length;
        const b = $("req-badge");
        if(b){ b.textContent=n||"!"; b.style.display=n?"":"none"; }
        if(view==="chat") loadRequestList();
        // Mostrar toast de nueva solicitud
        if(n>0) {
          const req = snap.docs[0].data();
          showRequestNotif(snap.docs[0].id, req);
        } else {
          hide("request-notif");
        }
      });
    }

    function showRequestNotif(reqId, req) {
      const notif = $("request-notif");
      if(!notif || view==="chat") return;
      notif.innerHTML = `
        <div class="rn-body">
          <div class="avatar sm" style="${avStyle(req.fromPhoto)}">${avLetter(req.fromName, req.fromPhoto)}</div>
          <div style="flex:1;min-width:0">
            <strong>${esc(req.fromName)}</strong> te envió una solicitud para chatear
          </div>
          <button class="btn-x" onclick="closeRequestNotif()" style="flex-shrink:0">✕</button>
        </div>
        <div class="rn-actions">
          <button class="btn-primary sm" onclick="acceptRequest('${reqId}','${req.from}','${esc(req.fromName)}');closeRequestNotif()">Aceptar</button>
          <button class="btn-danger sm" onclick="declineRequest('${reqId}');closeRequestNotif()">Eliminar</button>
          <button class="btn-secondary sm" onclick="goView('chat');closeRequestNotif()">Ver solicitudes</button>
        </div>`;
      show("request-notif");
    }

    function closeRequestNotif() { hide("request-notif"); }

    function showToast(msg) {
      let t = document.createElement("div");
      t.className = "toast-msg";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(()=>t.classList.add("show"), 10);
      setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),400); }, 3200);
    }

    // ─── CHAT VIEW ────────────────────────────────
    function renderChatView() {
      inn("main", `
        <div class="chat-layout">
          <div class="chat-sidebar" id="chat-sb">
            <div class="chat-sb-hd">
              <h3>Mensajes</h3>
              <button class="btn-icon" onclick="openNewChatModal()" title="Buscar usuario">+</button>
            </div>
            <div class="chat-tabs-row">
              <button class="tab active" id="ctab-msgs" onclick="showChatTab('msgs')">Chats</button>
              <button class="tab" id="ctab-reqs" onclick="showChatTab('reqs')">Solicitudes <span class="badge" id="req-badge2" style="display:none"></span></button>
            </div>
            <div id="chat-list-wrap"></div>
            <div id="req-list-wrap" style="display:none"></div>
          </div>
          <div class="chat-main" id="chat-main">
            <div class="chat-empty">
              <div class="ei">💬</div>
              <p>Selecciona un chat</p>
            </div>
          </div>
        </div>`);
      loadChatList();
      loadRequestList();
      if(activeChatId) openChatRoom(activeChatId, activeOtherName, activeOtherId);
    }

    function showChatTab(t) {
      document.querySelectorAll(".chat-tabs-row .tab").forEach(x=>x.classList.remove("active"));
      $(`ctab-${t}`)?.classList.add("active");
      if(t==="msgs"){ show("chat-list-wrap"); hide("req-list-wrap"); }
      else           { hide("chat-list-wrap"); show("req-list-wrap"); loadRequestList(); }
    }

    function loadChatList() {
      if(unsubChats) unsubChats();
      const q = query(collection(db,"chats"), where("members","array-contains",ME.uid), orderBy("lastMessageAt","desc"));
      unsubChats = onSnapshot(q, snap => {
        const chats = snap.docs.map(d=>({id:d.id,...d.data()}));
        renderChatList(chats);
      });
    }

    function renderChatList(chats) {
      const wrap = $("chat-list-wrap");
      if(!wrap) return;
      const accepted = chats.filter(c=>c.accepted);
      if(!accepted.length){ wrap.innerHTML=`<p class="subtle" style="padding:16px;font-size:13px">Sin conversaciones aún</p>`; return; }
      wrap.innerHTML = accepted.map(c=>{
        const oid    = c.members.find(m=>m!==ME.uid);
        const oname  = c.memberNames?.[oid]||"Usuario";
        const ophoto = c.memberPhotos?.[oid]||"";
        const ts     = c.lastMessageAt ? new Date(c.lastMessageAt.seconds*1000).toLocaleDateString("es",{day:"numeric",month:"short"}) : "";
        return `<div class="chat-item ${activeChatId===c.id?"active":""}" onclick="openChatRoom('${c.id}','${esc(oname)}','${oid}')">
          <div class="avatar sm" style="${avStyle(ophoto)}">${avLetter(oname, ophoto)}</div>
          <div class="chat-item-info">
            <div class="ci-name">${esc(oname)}</div>
            <div class="ci-last">${esc(c.lastMessage||"")}</div>
          </div>
          <div class="ci-time">${ts}</div>
        </div>`;
      }).join("");
    }

    async function loadRequestList() {
      const q = query(collection(db,"chatRequests"), where("to","==",ME.uid), where("status","==","pending"));
      const snap = await getDocs(q);
      const reqs = snap.docs.map(d=>({id:d.id,...d.data()}));
      const n = reqs.length;
      [$("req-badge"), $("req-badge2")].forEach(b=>{
        if(!b) return; b.textContent=n||"!"; b.style.display=n?"":"none";
      });
      const wrap = $("req-list-wrap");
      if(!wrap) return;
      if(!reqs.length){ wrap.innerHTML=`<p class="subtle" style="padding:16px;font-size:13px">Sin solicitudes pendientes</p>`; return; }
      wrap.innerHTML = reqs.map(r=>`
        <div class="req-card">
          <div class="avatar sm" style="${avStyle(r.fromPhoto)}" onclick="visitProfile('${r.from}')">${avLetter(r.fromName, r.fromPhoto)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;cursor:pointer" onclick="visitProfile('${r.from}')">${esc(r.fromName)}</div>
            <div class="subtle" style="font-size:12px">${r.isWelcome?"¡Bienvenido/a a Nexus! 👋":"quiere enviarte un mensaje"}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            <button class="btn-primary sm" onclick="acceptRequest('${r.id}','${r.from}','${esc(r.fromName)}')">Aceptar</button>
            <button class="btn-danger sm" onclick="declineRequest('${r.id}')">Eliminar</button>
          </div>
        </div>`).join("");
    }

    async function openChatRoom(cid, oname, oid) {
      activeChatId    = cid;
      activeOtherName = oname;
      activeOtherId   = oid;
      if(unsubMsgs) unsubMsgs();

      const chatMain = $("chat-main");
      if(!chatMain) return;

      // Verify chat is accepted before allowing messages
      const chatSnap = await getDoc(doc(db,"chats",cid));
      if(!chatSnap.exists() || !chatSnap.data().accepted) {
        chatMain.innerHTML = `<div class="chat-empty"><div class="ei">🔒</div><p>Este chat aún no está activo</p></div>`;
        return;
      }

      const otherSnap = await getDoc(doc(db,"users",oid));
      const otherPhoto = otherSnap.exists() ? otherSnap.data().photoURL||"" : "";

      chatMain.innerHTML = `
        <div class="chat-room-hd">
          <div class="avatar sm" style="${avStyle(otherPhoto)}" onclick="visitProfile('${oid}')">${avLetter(oname, otherPhoto)}</div>
          <span class="chat-room-name" onclick="visitProfile('${oid}')">${esc(oname)}</span>
        </div>
        <div class="msgs-list" id="msgs-list"></div>
        <div class="chat-inp-row">
          <input class="inp" id="msg-inp" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendMessage('${cid}')"/>
          <button class="btn-primary sm" onclick="sendMessage('${cid}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>`;

      const q = query(collection(db,"chats",cid,"messages"), orderBy("createdAt","asc"));
      unsubMsgs = onSnapshot(q, snap=>{
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
        renderMessages(msgs);
      });

      // Refresh chat list
      loadChatList();
    }

    function renderMessages(msgs) {
      const list = $("msgs-list");
      if(!list) return;
      if(!msgs.length){ list.innerHTML=`<p class="subtle" style="text-align:center;padding:40px">Di hola 👋</p>`; return; }
      list.innerHTML = msgs.map(m=>{
        const mine = m.senderId===ME.uid;
        const ts   = m.createdAt ? new Date(m.createdAt.seconds*1000).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="msg ${mine?"mine":"theirs"}">
          <div class="bubble">${esc(m.content)}</div>
          <div class="msg-ts">${ts}</div>
        </div>`;
      }).join("");
      list.scrollTop = list.scrollHeight;
    }

    async function sendMessage(cid) {
      const inp = $("msg-inp");
      const t   = inp?.value.trim();
      if(!t || !cid) return;

      // Verify chat exists & is accepted
      const chatSnap = await getDoc(doc(db,"chats",cid));
      if(!chatSnap.exists() || !chatSnap.data().accepted) {
        showToast("Este chat no está activo. Espera que el otro usuario acepte.");
        return;
      }

      inp.value = "";
      inp.focus();
      await addDoc(collection(db,"chats",cid,"messages"), {
        content: t,
        senderId: ME.uid,
        senderName: ME.displayName||ME.email,
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db,"chats",cid), {
        lastMessage: t,
        lastMessageAt: serverTimestamp()
      });
    }

    async function openNewChatModal() {
      const email = prompt("Correo del usuario al que quieres escribir:");
      if(!email) return;
      const q = query(collection(db,"users"), where("email","==",email.trim()));
      const snap = await getDocs(q);
      if(snap.empty){ showToast("Usuario no encontrado"); return; }
      const other = snap.docs[0].data();
      if(other.uid===ME.uid){ showToast("No puedes chatear contigo mismo"); return; }
      await openChatWith(other.uid, other.displayName||other.email);
    }

    // ══════════════════════════════════════════
    //  MY PROFILE
    // ══════════════════════════════════════════
    async function renderMyProfile() {
      const snap = await getDoc(doc(db,"users",ME.uid));
      meData = snap.data()||meData;
      const u = meData;
      const photo = u.photoURL||ME.photoURL||"";

      inn("main", `
        <div class="profile-hero">
          <div class="avatar xl" id="profile-av" style="${avStyle(photo)}">${avLetter(ME.displayName||ME.email, photo)}</div>
          <div class="profile-info">
            <h2>${esc(ME.displayName||ME.email)}</h2>
            <p class="subtle" style="font-size:13px">${esc(ME.email)}</p>
            <p class="profile-bio" style="margin-top:6px">${esc(u.bio||"Sin bio")}</p>
            <div class="follow-stats">
              <span class="follow-stat-btn" onclick="showFollowModal('${ME.uid}','followers')"><strong>${(u.followers||[]).length}</strong> seguidores</span>
              <span class="follow-stat-btn" onclick="showFollowModal('${ME.uid}','following')"><strong>${(u.following||[]).length}</strong> siguiendo</span>
            </div>
          </div>
        </div>

        <div class="edit-section">
          <h4>✏️ Editar perfil</h4>
          <label class="inp-label">Nombre</label>
          <input class="inp" id="e-name" value="${esc(ME.displayName||"")}"/>
          <label class="inp-label">Bio</label>
          <input class="inp" id="e-bio" value="${esc(u.bio||"")}" placeholder="Cuéntanos sobre ti..."/>
          <label class="inp-label">URL de foto de perfil</label>
          <div style="display:flex;gap:8px;align-items:flex-start">
            <div style="flex:1">
              <input class="inp" id="e-photo" value="${esc(photo)}" placeholder="https://i.imgur.com/..." oninput="previewPhoto()"/>
            </div>
          </div>
          <div id="photo-prev" style="margin-top:6px">${photo?`<img src="${esc(photo)}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)" onerror="this.style.opacity=.3"/>`:""}</div>
          <button class="btn-primary" style="align-self:flex-start" onclick="saveProfile()">Guardar cambios</button>
        </div>

        <h4 style="margin:24px 0 14px;font-family:'Syne',sans-serif;font-size:17px">Mis publicaciones</h4>
        <div id="my-posts"><div class="loader-txt">Cargando...</div></div>`);

      const q = query(collection(db,"posts"), where("authorId","==",ME.uid), orderBy("createdAt","desc"));
      onSnapshot(q, snap=>{
        const posts = snap.docs.map(d=>({id:d.id,...d.data()}));
        const el = $("my-posts");
        if(!el) return;
        el.innerHTML = posts.length ? posts.map(postCard).join("") : `<p class="subtle" style="padding:20px 0">Sin publicaciones aún</p>`;
      });
    }

    function previewPhoto() {
      const url  = $("e-photo")?.value.trim();
      const prev = $("photo-prev");
      if(!prev) return;
      prev.innerHTML = url
        ? `<img src="${esc(url)}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)" onerror="this.style.opacity=.3"/>`
        : "";
    }

    async function saveProfile() {
      const name  = $("e-name")?.value.trim();
      const bio   = $("e-bio")?.value.trim();
      const photo = $("e-photo")?.value.trim();
      if(!name){ showToast("El nombre no puede estar vacío"); return; }
      await updateProfile(ME, { displayName: name, photoURL: photo||"" });
      await updateDoc(doc(db,"users",ME.uid), { displayName: name, bio: bio||"", photoURL: photo||"" });
      meData.displayName = name; meData.bio = bio||""; meData.photoURL = photo||"";
      set("sb-name", name);
      const sbAv = $("sb-av");
      if(sbAv){
        if(photo){ sbAv.setAttribute("style", avStyle(photo)); sbAv.textContent=""; }
        else { sbAv.removeAttribute("style"); sbAv.textContent = name[0].toUpperCase(); }
      }
      showToast("✅ Perfil actualizado");
      renderMyProfile();
    }

    async function doLogout() {
      if(unsubFeed) unsubFeed();
      if(unsubMsgs) unsubMsgs();
      if(unsubRequests) unsubRequests();
      if(unsubChats) unsubChats();
      await signOut(auth);
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:      #0c0c13;
      --surface: #13131e;
      --s2:      #1a1a28;
      --border:  #252535;
      --accent:  #7c4dff;
      --a2:      #00e5ff;
      --danger:  #ff5252;
      --text:    #e6e6f0;
      --subtle:  #686878;
      --r:       14px;
    }

    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ─── AUTH ────────────────────────── */
    .auth-bg {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(ellipse at 20% 20%, #1e0a40, var(--bg) 55%),
                  radial-gradient(ellipse at 80% 80%, #051a28, transparent 50%);
      padding:16px;
    }
    .auth-card { width:400px; max-width:100%; background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:36px 32px; display:flex; flex-direction:column; gap:14px; }
    .auth-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:34px; letter-spacing:-1px; text-align:center; background:linear-gradient(135deg,var(--accent),var(--a2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .auth-sub  { text-align:center; color:var(--subtle); font-size:13px; margin-top:-8px; }
    .auth-tabs { display:flex; gap:8px; }
    .auth-tab  { flex:1; padding:10px; border:1px solid var(--border); background:none; color:var(--subtle); border-radius:8px; cursor:pointer; font-family:inherit; font-size:14px; transition:all .2s; }
    .auth-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .or-divider { text-align:center; color:var(--subtle); font-size:12px; position:relative; }
    .or-divider::before,.or-divider::after { content:""; position:absolute; top:50%; width:44%; height:1px; background:var(--border); }
    .or-divider::before{left:0} .or-divider::after{right:0}
    .btn-google { display:flex; align-items:center; justify-content:center; gap:10px; padding:11px; border:1px solid var(--border); background:var(--s2); color:var(--text); border-radius:10px; cursor:pointer; font-family:inherit; font-size:14px; transition:all .2s; }
    .btn-google:hover { border-color:var(--accent); }
    .auth-err  { color:var(--danger); font-size:12px; text-align:center; min-height:16px; }

    /* ─── INPUTS + BUTTONS ────────────── */
    .inp { width:100%; padding:11px 13px; background:var(--s2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color .2s; }
    .inp:focus { border-color:var(--accent); }
    .inp-label { font-size:12px; color:var(--subtle); margin-bottom:3px; display:block; }

    .btn-primary { padding:11px 20px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; transition:opacity .2s,transform .1s; white-space:nowrap; }
    .btn-primary:hover { opacity:.85; }
    .btn-primary:active { transform:scale(.97); }
    .btn-primary.w100 { width:100%; }
    .btn-primary.sm { padding:8px 14px; border-radius:8px; }
    .btn-secondary { padding:9px 16px; background:var(--s2); color:var(--text); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-family:inherit; font-size:13px; transition:all .2s; white-space:nowrap; }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .btn-secondary.sm { padding:7px 12px; font-size:12px; }
    .btn-danger { padding:8px 14px; background:rgba(255,82,82,.12); color:var(--danger); border:1px solid rgba(255,82,82,.3); border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; transition:all .2s; }
    .btn-danger:hover { background:rgba(255,82,82,.22); }
    .btn-danger.sm { padding:7px 12px; font-size:12px; }

    /* ─── MOBILE TOP BAR ──────────────── */
    .mobile-topbar { display:none; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .hamburger { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; gap:5px; padding:4px; }
    .hamburger span { display:block; width:22px; height:2px; background:var(--text); border-radius:2px; transition:all .3s; }
    .mobile-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:150; }
    .mobile-overlay.active { display:block; }

    /* ─── SHELL ───────────────────────── */
    .app { display:flex; min-height:100vh; }
    .sidebar { width:240px; min-height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:22px 14px; position:sticky; top:0; height:100vh; flex-shrink:0; z-index:200; transition:transform .3s; }
    .sidebar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; background:linear-gradient(135deg,var(--accent),var(--a2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:26px; padding-left:8px; }
    .sidebar-nav { flex:1; display:flex; flex-direction:column; gap:3px; }
    .nav-item { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; color:var(--subtle); text-decoration:none; cursor:pointer; font-size:14px; font-weight:500; transition:all .2s; position:relative; }
    .nav-item:hover { background:var(--s2); color:var(--text); }
    .nav-item.active { background:rgba(124,77,255,.15); color:var(--accent); }
    .badge { background:var(--danger); color:#fff; font-size:10px; padding:1px 5px; border-radius:20px; position:absolute; right:10px; }
    .btn-new-post { display:flex; align-items:center; justify-content:center; gap:8px; margin:18px 0; padding:12px; border:none; background:linear-gradient(135deg,var(--accent),#9c27b0); color:#fff; border-radius:12px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:13px; transition:opacity .2s; }
    .btn-new-post:hover { opacity:.85; }
    .sidebar-user { display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; border:1px solid var(--border); cursor:pointer; transition:background .2s; margin-top:auto; }
    .sidebar-user:hover { background:var(--s2); }
    .sb-name  { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sb-email { font-size:11px; color:var(--subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-logout { margin-left:auto; background:none; border:none; color:var(--subtle); cursor:pointer; padding:4px; transition:color .2s; flex-shrink:0; }
    .btn-logout:hover { color:var(--danger); }

    /* ─── AVATAR ──────────────────────── */
    .avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#9c27b0); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:16px; color:#fff; flex-shrink:0; cursor:pointer; }
    .avatar.sm { width:34px; height:34px; font-size:13px; }
    .avatar.xl { width:86px; height:86px; font-size:32px; border:3px solid var(--accent); }

    /* ─── MAIN ────────────────────────── */
    .main { flex:1; max-width:680px; padding:24px 24px 80px; overflow-y:auto; max-height:100vh; }

    /* ─── FEED ────────────────────────── */
    .page-hd { margin-bottom:20px; }
    .page-hd h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; margin-bottom:14px; }
    .tab-row { display:flex; gap:8px; }
    .tab { padding:8px 18px; border:1px solid var(--border); background:none; color:var(--subtle); border-radius:20px; cursor:pointer; font-family:inherit; font-size:13px; transition:all .2s; }
    .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* ─── POST CARD ───────────────────── */
    .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:14px; transition:border-color .2s; }
    .post-card:hover { border-color:rgba(124,77,255,.4); }
    .post-hd { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .post-author { font-weight:600; font-size:14px; cursor:pointer; }
    .post-author:hover { color:var(--accent); }
    .post-time { font-size:11px; color:var(--subtle); }
    .post-body { font-size:14px; line-height:1.65; margin-bottom:12px; word-break:break-word; white-space:pre-wrap; }
    .post-img-wrap { border-radius:10px; overflow:hidden; margin-bottom:12px; }
    .post-img-wrap img { width:100%; max-height:420px; object-fit:cover; cursor:pointer; display:block; }
    .post-actions { display:flex; gap:7px; flex-wrap:wrap; }
    .act-btn { display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--border); background:none; color:var(--subtle); border-radius:20px; cursor:pointer; font-family:inherit; font-size:12px; transition:all .2s; }
    .act-btn:hover { border-color:var(--accent); color:var(--accent); }
    .act-btn.liked { color:var(--danger); border-color:rgba(255,82,82,.3); }

    /* ─── AD CARD ─────────────────────── */
    .ad-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:14px; position:relative; overflow:hidden; }
    .ad-card::before { content:""; position:absolute; inset:0; background:linear-gradient(135deg,rgba(124,77,255,.04),rgba(0,229,255,.04)); pointer-events:none; }
    .ad-label { font-size:10px; color:var(--subtle); text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; font-weight:600; }
    .ad-body { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .ad-icon { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ad-title { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; margin-bottom:4px; }
    .ad-desc { font-size:12px; color:var(--subtle); line-height:1.5; }
    .ad-cta { background:none; border:1px solid; border-radius:8px; padding:7px 14px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; transition:all .2s; }
    .ad-cta:hover { opacity:.75; }

    /* ─── POST DETAIL ─────────────────── */
    .back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-family:inherit; font-size:14px; margin-bottom:16px; display:block; }
    .comments-box { margin-top:16px; }
    .comments-box h4 { font-family:'Syne',sans-serif; font-size:16px; margin-bottom:14px; }
    .cmt-input-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .cmt { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
    .cmt-name { font-weight:600; font-size:13px; cursor:pointer; }
    .cmt-name:hover { color:var(--accent); }
    .cmt-body { font-size:13px; }

    /* ─── PROFILE ─────────────────────── */
    .profile-hero { display:flex; align-items:flex-start; gap:20px; margin-bottom:24px; flex-wrap:wrap; }
    .profile-info h2 { font-family:'Syne',sans-serif; font-size:22px; }
    .profile-bio { font-size:13px; color:var(--subtle); }
    .follow-stats { display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; }
    .follow-stat-btn { font-size:13px; cursor:pointer; color:var(--subtle); transition:color .2s; }
    .follow-stat-btn:hover { color:var(--text); }
    .follow-stat-btn strong { color:var(--text); }
    .edit-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; display:flex; flex-direction:column; gap:10px; }
    .edit-section h4 { font-family:'Syne',sans-serif; font-size:15px; }
    .follow-row { display:flex; align-items:center; gap:12px; padding:10px; border-radius:10px; cursor:pointer; transition:background .2s; }
    .follow-row:hover { background:var(--s2); }

    /* ─── CHAT ────────────────────────── */
    .chat-layout { display:flex; height:calc(100vh - 48px); gap:0; }
    .chat-sidebar { width:290px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
    .chat-sb-hd { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
    .chat-sb-hd h3 { font-family:'Syne',sans-serif; font-size:17px; }
    .btn-icon { background:none; border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .btn-icon:hover { border-color:var(--accent); color:var(--accent); }
    .chat-tabs-row { display:flex; border-bottom:1px solid var(--border); padding:8px 8px 0; gap:4px; }
    .chat-tabs-row .tab { border-radius:8px 8px 0 0; font-size:12px; padding:7px 12px; }
    #chat-list-wrap, #req-list-wrap { overflow-y:auto; flex:1; }
    .chat-item { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:background .2s; border-bottom:1px solid var(--border); }
    .chat-item:hover, .chat-item.active { background:rgba(124,77,255,.1); }
    .chat-item-info { flex:1; min-width:0; }
    .ci-name { font-size:13px; font-weight:600; }
    .ci-last { font-size:12px; color:var(--subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ci-time { font-size:11px; color:var(--subtle); white-space:nowrap; }
    .req-card { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .chat-main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--subtle); }
    .chat-room-hd { display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .chat-room-name { font-weight:600; font-size:15px; cursor:pointer; }
    .chat-room-name:hover { color:var(--accent); }
    .msgs-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
    .msg { display:flex; flex-direction:column; max-width:72%; }
    .msg.mine   { align-self:flex-end;   align-items:flex-end;   }
    .msg.theirs { align-self:flex-start; align-items:flex-start; }
    .bubble { padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; word-break:break-word; }
    .mine .bubble   { background:var(--accent); color:#fff; border-bottom-right-radius:3px; }
    .theirs .bubble { background:var(--s2);               border-bottom-left-radius:3px;  }
    .msg-ts { font-size:10px; color:var(--subtle); margin-top:3px; }
    .chat-inp-row { display:flex; align-items:center; gap:8px; padding:13px 16px; border-top:1px solid var(--border); flex-shrink:0; }

    /* ─── REQUEST NOTIFICATION ────────── */
    .request-notif { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); border-radius:16px; padding:16px; width:320px; max-width:calc(100vw - 32px); z-index:9998; box-shadow:0 8px 40px rgba(124,77,255,.3); animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .rn-body { display:flex; align-items:center; gap:10px; font-size:13px; margin-bottom:12px; }
    .rn-actions { display:flex; gap:8px; flex-wrap:wrap; }

    /* ─── TOAST ───────────────────────── */
    .toast-msg { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--s2); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:30px; font-size:13px; z-index:9999; opacity:0; transition:all .35s; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    .toast-msg.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ─── MODAL ───────────────────────── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:999; padding:16px; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px; width:480px; max-width:100%; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
    .modal-hd { display:flex; align-items:center; justify-content:space-between; }
    .modal-hd h3 { font-family:'Syne',sans-serif; font-size:17px; }
    .btn-x { background:none; border:none; color:var(--subtle); font-size:18px; cursor:pointer; }
    .btn-x:hover { color:var(--danger); }
    .txtarea { width:100%; min-height:110px; padding:12px 13px; background:var(--s2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:14px; outline:none; resize:vertical; line-height:1.6; }
    .txtarea:focus { border-color:var(--accent); }
    .modal-ft { display:flex; align-items:center; justify-content:space-between; }

    /* ─── UTILS ───────────────────────── */
    .subtle    { color:var(--subtle); }
    .sm        { font-size:12px; }
    .loader-txt{ color:var(--subtle); font-size:14px; padding:40px; text-align:center; }
    .empty     { text-align:center; padding:60px 20px; color:var(--subtle); }
    .ei        { font-size:48px; margin-bottom:12px; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    #config-notice { position:fixed; bottom:20px; right:20px; background:var(--accent); color:#fff; padding:14px 18px; border-radius:12px; font-size:13px; max-width:300px; z-index:9999; box-shadow:0 8px 30px rgba(124,77,255,.45); line-height:1.6; }

    /* ─── MOBILE RESPONSIVE ──────────── */
    @media (max-width: 768px) {
      .mobile-topbar { display:flex; }

      .sidebar {
        position:fixed; left:0; top:0; height:100vh;
        transform:translateX(-100%);
        box-shadow:4px 0 24px rgba(0,0,0,.5);
      }
      .sidebar.open { transform:translateX(0); }

      .app { flex-direction:column; }
      .main { max-width:100%; padding:16px 12px 80px; max-height:calc(100vh - 57px); margin-top:57px; }

      /* Chat mobile */
      .chat-layout { height:calc(100vh - 57px); flex-direction:column; }
      .chat-sidebar { width:100%; height:auto; max-height:45vh; border-right:none; border-bottom:1px solid var(--border); }
      #chat-list-wrap, #req-list-wrap { max-height:200px; }
      .chat-main { height:0; flex:1; }

      .request-notif { left:12px; right:12px; bottom:12px; width:auto; }
      .toast-msg { white-space:normal; text-align:center; max-width:calc(100vw - 48px); }
      
      .profile-hero { flex-direction:column; align-items:center; text-align:center; }
      .follow-stats { justify-content:center; }
      .profile-info div[style*="flex"] { justify-content:center; }

      .post-card { padding:14px; }
      .msg { max-width:85%; }
    }

    @media (max-width: 480px) {
      .auth-card { padding:28px 20px; }
      .chat-sb-hd h3 { font-size:15px; }
      .page-hd h2 { font-size:22px; }
      .avatar.xl { width:70px; height:70px; font-size:26px; }
    }
  </style>
</head>
<body>
  <div id="config-notice">
    ⚙️ <strong>Configura Firebase:</strong> Reemplaza <code>firebaseConfig</code> con tus datos.
    <a href="#" style="color:#ccc;display:block;margin-top:6px" onclick="this.parentElement.remove();return false">Cerrar aviso</a>
  </div>
</body>
