<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Red Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, signOut, updateProfile,
      GoogleAuthProvider, signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc,
      getDoc, setDoc, updateDoc, deleteDoc, query, orderBy,
      onSnapshot, where, serverTimestamp, increment, arrayUnion, arrayRemove, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ─── FIREBASE CONFIG ───────────────────────────────────────────────
    // 🔧 REPLACE WITH YOUR FIREBASE CONFIG:
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // ─── STATE ─────────────────────────────────────────────────────────
    let currentUser = null;
    let currentView = "feed"; // feed | chat | profile | post-detail
    let feedTab = "popular"; // popular | recent
    let activeChatId = null;
    let unsubFeed = null;
    let unsubChats = null;
    let unsubMessages = null;

    // ─── DOM HELPERS ────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const show = id => $(id) && ($(id).style.display = "");
    const hide = id => $(id) && ($(id).style.display = "none");
    const setText = (id, t) => $(id) && ($(id).textContent = t);
    const html = (id, h) => $(id) && ($(id).innerHTML = h);

    // ─── INIT ───────────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        ensureUserDoc(user);
        renderApp();
        loadFeed();
        listenChats();
      } else {
        renderAuth();
      }
    });

    async function ensureUserDoc(user) {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          displayName: user.displayName || user.email.split("@")[0],
          email: user.email,
          photoURL: user.photoURL || "",
          bio: "",
          createdAt: serverTimestamp()
        });
      }
    }

    // ─── RENDER AUTH ────────────────────────────────────────────────────
    function renderAuth() {
      document.body.innerHTML = `
        <div class="auth-bg">
          <div class="auth-card" id="auth-card">
            <div class="auth-logo">NEXUS</div>
            <p class="auth-tagline">Tu espacio sin filtros</p>
            <div class="auth-tabs">
              <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Entrar</button>
              <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Registrarse</button>
            </div>
            <div id="auth-form-area">
              ${loginForm()}
            </div>
            <div class="auth-or"><span>o continúa con</span></div>
            <button class="btn-google" onclick="loginGoogle()">
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              Google
            </button>
            <p id="auth-error" class="auth-error"></p>
          </div>
        </div>`;
      window.switchAuthTab = switchAuthTab;
      window.loginGoogle = loginGoogle;
      window.doLogin = doLogin;
      window.doRegister = doRegister;
    }

    function loginForm() {
      return `
        <input class="auth-input" id="auth-email" type="email" placeholder="Correo electrónico"/>
        <input class="auth-input" id="auth-pass" type="password" placeholder="Contraseña"/>
        <button class="btn-primary full" onclick="doLogin()">Entrar</button>`;
    }

    function registerForm() {
      return `
        <input class="auth-input" id="auth-name" type="text" placeholder="Nombre de usuario"/>
        <input class="auth-input" id="auth-email" type="email" placeholder="Correo electrónico"/>
        <input class="auth-input" id="auth-pass" type="password" placeholder="Contraseña (mín. 6 chars)"/>
        <button class="btn-primary full" onclick="doRegister()">Crear cuenta</button>`;
    }

    function switchAuthTab(tab) {
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      $(`tab-${tab}`).classList.add("active");
      html("auth-form-area", tab === "login" ? loginForm() : registerForm());
    }

    async function doLogin() {
      try {
        await signInWithEmailAndPassword(auth, $("auth-email").value, $("auth-pass").value);
      } catch(e) {
        $("auth-error").textContent = "Error: " + e.message;
      }
    }

    async function doRegister() {
      try {
        const name = $("auth-name").value.trim();
        const cred = await createUserWithEmailAndPassword(auth, $("auth-email").value, $("auth-pass").value);
        await updateProfile(cred.user, { displayName: name });
      } catch(e) {
        $("auth-error").textContent = "Error: " + e.message;
      }
    }

    async function loginGoogle() {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch(e) {
        if ($("auth-error")) $("auth-error").textContent = "Error: " + e.message;
      }
    }

    // ─── MAIN APP SHELL ─────────────────────────────────────────────────
    function renderApp() {
      document.body.innerHTML = `
        <div class="app">
          <aside class="sidebar">
            <div class="sidebar-logo">NEXUS</div>
            <nav class="sidebar-nav">
              <a class="nav-item active" id="nav-feed" onclick="goView('feed')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Inicio
              </a>
              <a class="nav-item" id="nav-chat" onclick="goView('chat')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                Mensajes
                <span id="chat-badge" class="badge" style="display:none"></span>
              </a>
              <a class="nav-item" id="nav-profile" onclick="goView('profile')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Mi Perfil
              </a>
            </nav>
            <button class="btn-post-new" onclick="openPostModal()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nueva Publicación
            </button>
            <div class="sidebar-user" onclick="goView('profile')">
              <div class="avatar sm" id="sidebar-avatar"></div>
              <div>
                <div class="sidebar-user-name" id="sidebar-name"></div>
                <div class="sidebar-user-email" id="sidebar-email"></div>
              </div>
              <button class="btn-logout" onclick="doLogout()" title="Cerrar sesión">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </aside>

          <main class="main-content" id="main-content">
            <!-- views rendered here -->
          </main>

          <!-- New Post Modal -->
          <div class="modal-overlay" id="post-modal" style="display:none" onclick="closePostModal(event)">
            <div class="modal-box">
              <div class="modal-header">
                <h3>Nueva Publicación</h3>
                <button onclick="closePostModal()" class="modal-close">✕</button>
              </div>
              <textarea class="post-textarea" id="post-content" placeholder="¿Qué está pasando?"></textarea>
              <input class="auth-input" id="post-img" type="url" placeholder="URL de imagen (opcional)"/>
              <div class="modal-footer">
                <span class="char-count" id="char-count">0/500</span>
                <button class="btn-primary" onclick="submitPost()">Publicar</button>
              </div>
            </div>
          </div>
        </div>`;

      // Bind globals
      window.goView = goView;
      window.openPostModal = openPostModal;
      window.closePostModal = closePostModal;
      window.submitPost = submitPost;
      window.doLogout = doLogout;
      window.likePost = likePost;
      window.openPost = openPost;
      window.openChat = openChat;
      window.sendMessage = sendMessage;
      window.sendChatFromFeed = sendChatFromFeed;

      // Populate user info
      const u = currentUser;
      setText("sidebar-name", u.displayName || u.email);
      setText("sidebar-email", "@" + (u.displayName || u.email).replace(/\s/g,"").toLowerCase());
      if (u.photoURL) {
        $("sidebar-avatar").style.backgroundImage = `url(${u.photoURL})`;
        $("sidebar-avatar").style.backgroundSize = "cover";
      } else {
        $("sidebar-avatar").textContent = (u.displayName || u.email)[0].toUpperCase();
      }

      // char counter
      $("post-content").addEventListener("input", () => {
        const len = $("post-content").value.length;
        $("char-count").textContent = len + "/500";
      });

      goView("feed");
    }

    function goView(view) {
      currentView = view;
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      const navEl = $(`nav-${view}`);
      if (navEl) navEl.classList.add("active");

      if (view === "feed") renderFeedView();
      else if (view === "chat") renderChatView();
      else if (view === "profile") renderProfileView();
    }

    // ─── FEED VIEW ───────────────────────────────────────────────────────
    function renderFeedView() {
      html("main-content", `
        <div class="feed-header">
          <h2>Descubrir</h2>
          <div class="feed-tabs">
            <button class="feed-tab ${feedTab==='popular'?'active':''}" id="ftab-popular" onclick="setFeedTab('popular')">
              🔥 Populares
            </button>
            <button class="feed-tab ${feedTab==='recent'?'active':''}" id="ftab-recent" onclick="setFeedTab('recent')">
              🕒 Recientes
            </button>
          </div>
        </div>
        <div class="posts-container" id="posts-container">
          <div class="loading-pulse">Cargando publicaciones...</div>
        </div>`);
      window.setFeedTab = setFeedTab;
      loadFeed();
    }

    function setFeedTab(tab) {
      feedTab = tab;
      document.querySelectorAll(".feed-tab").forEach(t => t.classList.remove("active"));
      $(`ftab-${tab}`).classList.add("active");
      loadFeed();
    }

    function loadFeed() {
      if (!currentUser || currentView !== "feed") return;
      if (unsubFeed) unsubFeed();

      const postsRef = collection(db, "posts");
      let q;
      if (feedTab === "popular") {
        q = query(postsRef, orderBy("score", "desc"), limit(50));
      } else {
        q = query(postsRef, orderBy("createdAt", "desc"), limit(50));
      }

      unsubFeed = onSnapshot(q, snap => {
        const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderPosts(posts);
      });
    }

    function renderPosts(posts) {
      if (!$("posts-container")) return;
      if (!posts.length) {
        html("posts-container", `<div class="empty-state">
          <div class="empty-icon">🌌</div>
          <p>Sin publicaciones aún. ¡Sé el primero!</p>
        </div>`);
        return;
      }
      html("posts-container", posts.map(postCard).join(""));
    }

    function postCard(p) {
      const liked = p.likes && p.likes.includes(currentUser.uid);
      const ts = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString("es", {day:"numeric", month:"short"}) : "";
      return `<div class="post-card" id="post-${p.id}">
        <div class="post-header">
          <div class="avatar" style="${p.authorPhoto ? `background-image:url(${p.authorPhoto});background-size:cover` : ''}">
            ${!p.authorPhoto ? (p.authorName||"?")[0].toUpperCase() : ""}
          </div>
          <div>
            <div class="post-author">${esc(p.authorName || "Anónimo")}</div>
            <div class="post-time">${ts}</div>
          </div>
        </div>
        <div class="post-body">${esc(p.content || "")}</div>
        ${p.imageUrl ? `<div class="post-image"><img src="${esc(p.imageUrl)}" alt="post image" onclick="openPost('${p.id}')"/></div>` : ""}
        <div class="post-actions">
          <button class="action-btn ${liked ? 'liked' : ''}" onclick="likePost('${p.id}', ${liked})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            ${(p.likes||[]).length}
          </button>
          <button class="action-btn" onclick="openPost('${p.id}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            ${p.commentCount || 0}
          </button>
          ${p.authorId !== currentUser.uid ? `<button class="action-btn" onclick="sendChatFromFeed('${p.authorId}', '${esc(p.authorName||"User")}')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Chat
          </button>` : ""}
        </div>
      </div>`;
    }

    async function likePost(postId, isLiked) {
      const ref = doc(db, "posts", postId);
      if (isLiked) {
        await updateDoc(ref, {
          likes: arrayRemove(currentUser.uid),
          score: increment(-1)
        });
      } else {
        await updateDoc(ref, {
          likes: arrayUnion(currentUser.uid),
          score: increment(1)
        });
      }
    }

    // ─── POST DETAIL ─────────────────────────────────────────────────────
    async function openPost(postId) {
      currentView = "post-detail";
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      html("main-content", `<div class="loading-pulse" style="padding:40px">Cargando...</div>`);

      const snap = await getDoc(doc(db, "posts", postId));
      const p = { id: snap.id, ...snap.data() };
      const liked = (p.likes||[]).includes(currentUser.uid);

      html("main-content", `
        <div class="post-detail">
          <button class="back-btn" onclick="goView('feed')">← Volver</button>
          ${postCard(p)}
          <div class="comments-section">
            <h4>Comentarios</h4>
            <div class="comment-input-row">
              <div class="avatar sm">${currentUser.displayName ? currentUser.displayName[0].toUpperCase() : "?"}</div>
              <input class="comment-input" id="comment-text" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter') addComment('${postId}')"/>
              <button class="btn-primary sm" onclick="addComment('${postId}')">Enviar</button>
            </div>
            <div id="comments-list"><div class="loading-pulse">Cargando comentarios...</div></div>
          </div>
        </div>`);

      window.addComment = addComment;
      loadComments(postId);
    }

    function loadComments(postId) {
      const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
      onSnapshot(q, snap => {
        const comments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (!$("comments-list")) return;
        if (!comments.length) {
          html("comments-list", `<p class="empty-comments">Sin comentarios aún.</p>`);
          return;
        }
        html("comments-list", comments.map(c => `
          <div class="comment">
            <div class="avatar sm" style="${c.authorPhoto?`background-image:url(${c.authorPhoto});background-size:cover`:''}">
              ${!c.authorPhoto ? (c.authorName||"?")[0].toUpperCase() : ""}
            </div>
            <div class="comment-body">
              <span class="comment-author">${esc(c.authorName||"Anónimo")}</span>
              <span class="comment-text">${esc(c.content)}</span>
            </div>
          </div>`).join(""));
      });
    }

    async function addComment(postId) {
      const text = $("comment-text").value.trim();
      if (!text) return;
      $("comment-text").value = "";
      await addDoc(collection(db, "posts", postId, "comments"), {
        content: text,
        authorId: currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        authorPhoto: currentUser.photoURL || "",
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, "posts", postId), {
        commentCount: increment(1),
        score: increment(2)
      });
    }

    // ─── NEW POST ────────────────────────────────────────────────────────
    function openPostModal() { show("post-modal"); }
    function closePostModal(e) {
      if (!e || e.target === $("post-modal") || !e.target) hide("post-modal");
    }

    async function submitPost() {
      const content = $("post-content").value.trim();
      const imageUrl = $("post-img").value.trim();
      if (!content) return;
      await addDoc(collection(db, "posts"), {
        content,
        imageUrl: imageUrl || "",
        authorId: currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        authorPhoto: currentUser.photoURL || "",
        likes: [],
        commentCount: 0,
        score: 0,
        createdAt: serverTimestamp()
      });
      $("post-content").value = "";
      $("post-img").value = "";
      hide("post-modal");
      feedTab = "recent";
      goView("feed");
    }

    // ─── CHAT VIEW ───────────────────────────────────────────────────────
    function renderChatView() {
      html("main-content", `
        <div class="chat-layout">
          <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-sidebar-header">
              <h3>Mensajes</h3>
              <button class="btn-icon" onclick="openNewChatModal()" title="Nuevo chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div id="chat-list"><div class="loading-pulse" style="padding:20px">Cargando chats...</div></div>
          </div>
          <div class="chat-main" id="chat-main">
            <div class="chat-empty-state">
              <div class="empty-icon">💬</div>
              <p>Selecciona un chat para empezar</p>
            </div>
          </div>
        </div>`);
      window.openNewChatModal = openNewChatModal;
      renderChatList();
    }

    function listenChats() {
      if (unsubChats) unsubChats();
      const q = query(
        collection(db, "chats"),
        where("members", "array-contains", currentUser.uid),
        orderBy("lastMessageAt", "desc")
      );
      unsubChats = onSnapshot(q, snap => {
        const chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (currentView === "chat") renderChatList(chats);
      });
    }

    async function renderChatList(chats) {
      if (!$("chat-list")) return;
      if (!chats) {
        const q = query(
          collection(db, "chats"),
          where("members", "array-contains", currentUser.uid),
          orderBy("lastMessageAt", "desc")
        );
        const snap = await getDocs(q);
        chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
      if (!chats.length) {
        html("chat-list", `<div class="empty-state" style="padding:20px"><p>Sin conversaciones aún</p></div>`);
        return;
      }
      html("chat-list", chats.map(c => {
        const otherId = c.members.find(m => m !== currentUser.uid);
        const other = c.memberNames?.[otherId] || "Usuario";
        const ts = c.lastMessageAt ? new Date(c.lastMessageAt.seconds*1000).toLocaleDateString("es",{day:"numeric",month:"short"}) : "";
        return `<div class="chat-item ${activeChatId===c.id?'active':''}" onclick="openChat('${c.id}', '${esc(other)}', '${otherId}')">
          <div class="avatar sm">${other[0].toUpperCase()}</div>
          <div class="chat-item-info">
            <div class="chat-item-name">${esc(other)}</div>
            <div class="chat-item-last">${esc(c.lastMessage||"")}</div>
          </div>
          <div class="chat-item-time">${ts}</div>
        </div>`;
      }).join(""));
    }

    async function openChat(chatId, otherName, otherId) {
      activeChatId = chatId;
      if (unsubMessages) unsubMessages();
      if ($("chat-main")) {
        html("chat-main", `
          <div class="chat-header">
            <div class="avatar sm">${otherName[0].toUpperCase()}</div>
            <div class="chat-header-name">${esc(otherName)}</div>
          </div>
          <div class="messages-list" id="messages-list"><div class="loading-pulse" style="padding:20px">Cargando...</div></div>
          <div class="chat-input-row">
            <input class="chat-input" id="msg-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMessage('${chatId}')"/>
            <button class="btn-primary sm" onclick="sendMessage('${chatId}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>`);
      }

      const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
      unsubMessages = onSnapshot(q, snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMessages(msgs);
      });

      // re-render chat list with active state
      renderChatList();
    }

    function renderMessages(msgs) {
      if (!$("messages-list")) return;
      if (!msgs.length) {
        html("messages-list", `<div class="empty-state" style="padding:40px">Sin mensajes aún. ¡Di hola!</div>`);
        return;
      }
      html("messages-list", msgs.map(m => {
        const mine = m.senderId === currentUser.uid;
        const ts = m.createdAt ? new Date(m.createdAt.seconds*1000).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="message ${mine?'mine':'theirs'}">
          <div class="bubble">${esc(m.content)}</div>
          <div class="msg-time">${ts}</div>
        </div>`;
      }).join(""));
      const list = $("messages-list");
      if (list) list.scrollTop = list.scrollHeight;
    }

    async function sendMessage(chatId) {
      const input = $("msg-input");
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      await addDoc(collection(db, "chats", chatId, "messages"), {
        content: text,
        senderId: currentUser.uid,
        senderName: currentUser.displayName || currentUser.email,
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, "chats", chatId), {
        lastMessage: text,
        lastMessageAt: serverTimestamp()
      });
    }

    async function sendChatFromFeed(targetId, targetName) {
      // Find or create chat
      const chatId = [currentUser.uid, targetId].sort().join("_");
      const chatRef = doc(db, "chats", chatId);
      const snap = await getDoc(chatRef);
      if (!snap.exists()) {
        await setDoc(chatRef, {
          members: [currentUser.uid, targetId],
          memberNames: {
            [currentUser.uid]: currentUser.displayName || currentUser.email,
            [targetId]: targetName
          },
          lastMessage: "",
          lastMessageAt: serverTimestamp()
        });
      }
      goView("chat");
      setTimeout(() => openChat(chatId, targetName, targetId), 300);
    }

    async function openNewChatModal() {
      const email = prompt("Escribe el correo del usuario al que quieres escribir:");
      if (!email) return;
      const q = query(collection(db, "users"), where("email", "==", email.trim()));
      const snap = await getDocs(q);
      if (snap.empty) { alert("Usuario no encontrado"); return; }
      const other = snap.docs[0].data();
      await sendChatFromFeed(other.uid, other.displayName || other.email);
    }

    // ─── PROFILE VIEW ────────────────────────────────────────────────────
    async function renderProfileView() {
      const u = currentUser;
      html("main-content", `
        <div class="profile-view">
          <div class="profile-header">
            <div class="avatar lg" id="profile-avatar" style="${u.photoURL?`background-image:url(${u.photoURL});background-size:cover`:''}">
              ${!u.photoURL ? (u.displayName||u.email)[0].toUpperCase() : ""}
            </div>
            <div class="profile-info">
              <h2 id="profile-name">${esc(u.displayName||"Sin nombre")}</h2>
              <p id="profile-email" class="subtle">${esc(u.email)}</p>
              <p id="profile-bio" class="profile-bio">Cargando...</p>
            </div>
          </div>
          <div class="profile-edit-section">
            <h4>Editar perfil</h4>
            <input class="auth-input" id="edit-name" placeholder="Nombre" value="${esc(u.displayName||'')}"/>
            <input class="auth-input" id="edit-bio" placeholder="Bio"/>
            <button class="btn-primary" onclick="saveProfile()">Guardar</button>
          </div>
          <div class="profile-posts">
            <h4>Mis publicaciones</h4>
            <div id="my-posts"><div class="loading-pulse">Cargando...</div></div>
          </div>
        </div>`);
      window.saveProfile = saveProfile;

      const userSnap = await getDoc(doc(db, "users", u.uid));
      if (userSnap.exists()) {
        const data = userSnap.data();
        setText("profile-bio", data.bio || "Sin bio");
        if ($("edit-bio")) $("edit-bio").value = data.bio || "";
      }

      // Load my posts
      const q = query(collection(db, "posts"), where("authorId", "==", u.uid), orderBy("createdAt", "desc"));
      onSnapshot(q, snap => {
        const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (!$("my-posts")) return;
        if (!posts.length) { html("my-posts", `<p class="subtle">Sin publicaciones aún.</p>`); return; }
        html("my-posts", posts.map(postCard).join(""));
      });
    }

    async function saveProfile() {
      const name = $("edit-name").value.trim();
      const bio = $("edit-bio").value.trim();
      await updateProfile(currentUser, { displayName: name });
      await updateDoc(doc(db, "users", currentUser.uid), { displayName: name, bio });
      setText("profile-name", name);
      setText("sidebar-name", name);
      alert("Perfil actualizado ✓");
    }

    async function doLogout() {
      if (unsubFeed) unsubFeed();
      if (unsubChats) unsubChats();
      if (unsubMessages) unsubMessages();
      await signOut(auth);
    }

    function esc(s) {
      if (!s) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
