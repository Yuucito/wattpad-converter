<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Red Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, signOut, updateProfile,
      GoogleAuthProvider, signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc,
      getDoc, setDoc, updateDoc, deleteDoc, query, orderBy,
      onSnapshot, where, serverTimestamp, increment,
      arrayUnion, arrayRemove, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ══════════════════════════════════════════
    //  🔧 FIREBASE CONFIG
    // ══════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyARcjrWOLq9l1AyvOkPHsb4YSZvO66lT5g",
      authDomain: "nexus-social-9dcf2.firebaseapp.com",
      projectId: "nexus-social-9dcf2",
      storageBucket: "nexus-social-9dcf2.firebasestorage.app",
      messagingSenderId: "1037219652720",
      appId: "1:1037219652720:web:7a5481847b4c8749d980b5"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const goog = new GoogleAuthProvider();

    // ─── STATE ──────────────────────────────────
    let ME = null;
    let meData = {};
    let view = "feed";
    let feedTab = "popular";
    let activeChatId = null;
    let activeOtherName = "";
    let activeOtherId = "";
    let unsubFeed = null;
    let unsubMsgs = null;
    let unsubChats = null;
    let chatPanelOpen = false;
    // Chat reply state
    let replyingTo = null; // { id, content, senderName }
    // Unread tracking: { chatId -> count }
    let unreadCounts = {};
    let totalUnread = 0;
    // Communities state
    let activeCircleId = null;
    let activeCircleData = null;
    let unsubCircleMsgs = null;
    let circleReplyingTo = null;
    let communitySubTab = "explore"; // "explore" | "mine"

    // ─── HELPERS ────────────────────────────────
    const $   = id => document.getElementById(id);
    const esc = s  => s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : "";
    const show = id => $(id) && ($(id).style.display = "");
    const hide = id => $(id) && ($(id).style.display = "none");
    const set  = (id,t) => $(id) && ($(id).textContent = t);
    const inn  = (id,h) => $(id) && ($(id).innerHTML = h);
    const avStyle = p => p ? `background-image:url('${esc(p)}');background-size:cover;background-position:center;font-size:0` : "";
    const avLetter = (name, photo) => photo ? "" : (name||"?")[0].toUpperCase();
    // Generate consistent chat ID from two uids
    const chatId = (a,b) => [a,b].sort().join("__");

    // ─── EXPOSE GLOBALS ─────────────────────────
    Object.assign(window, {
      switchAuthTab, doLogin, doRegister, loginGoogle,
      goView, openPostModal, closePostModal, submitPost,
      likePost, openPost, addComment, setFeedTab,
      openChatWith, openChatRoom, sendMessage, selectChat,
      openNewChatModal, saveProfile, doLogout, visitProfile,
      followUser, unfollowUser, showFollowModal, closeFollowModal,
      showChatTab, closeMobileSidebar, toggleMobileSidebar,
      backToChatList, deletePost,
      replyToComment, cancelReply,
      setReplyMsg, cancelReplyMsg,
      openCreateCircleModal, closeCreateCircleModal, submitCircle,
      joinCircle, openCircle, backToCommunities, setCommunitySubTab,
      sendCircleMessage, setCircleReplyMsg, cancelCircleReplyMsg,
      openCircleInfo, closeCircleInfo
    });

    // ══════════════════════════════════════════
    //  AUTH
    // ══════════════════════════════════════════
    onAuthStateChanged(auth, async user => {
      if (user) {
        ME = user;
        meData = await ensureUserDoc(user);
        renderApp();
      } else {
        ME = null;
        renderAuth();
      }
    });

    async function ensureUserDoc(user) {
      const ref  = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        const data = {
          uid: user.uid,
          displayName: user.displayName || user.email.split("@")[0],
          email: user.email,
          photoURL: user.photoURL || "",
          bio: "",
          followers: [],
          following: [],
          createdAt: serverTimestamp()
        };
        await setDoc(ref, data);
        return data;
      }
      return snap.data();
    }

    function renderAuth() {
      document.body.innerHTML = `
      <div class="auth-bg">
        <div class="auth-card">
          <div class="auth-logo">NEXUS</div>
          <p class="auth-sub">Tu espacio sin filtros</p>
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Entrar</button>
            <button class="auth-tab" id="tab-reg" onclick="switchAuthTab('reg')">Registrarse</button>
          </div>
          <div id="auth-body">${loginHTML()}</div>
          <div class="or-divider"><span>o</span></div>
          <button class="btn-google" onclick="loginGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continuar con Google
          </button>
          <p class="auth-err" id="auth-err"></p>
        </div>
      </div>`;
    }

    const loginHTML = () => `
      <input class="inp" id="a-email" type="email" placeholder="Correo electrónico"/>
      <input class="inp" id="a-pass" type="password" placeholder="Contraseña"/>
      <button class="btn-primary w100" onclick="doLogin()">Entrar</button>`;

    const regHTML = () => `
      <input class="inp" id="a-name" type="text" placeholder="Nombre de usuario"/>
      <input class="inp" id="a-email" type="email" placeholder="Correo electrónico"/>
      <input class="inp" id="a-pass" type="password" placeholder="Contraseña (mín. 6)"/>
      <button class="btn-primary w100" onclick="doRegister()">Crear cuenta</button>`;

    function switchAuthTab(t) {
      document.querySelectorAll(".auth-tab").forEach(x=>x.classList.remove("active"));
      $(`tab-${t}`).classList.add("active");
      inn("auth-body", t==="login" ? loginHTML() : regHTML());
    }
    async function doLogin() {
      try { await signInWithEmailAndPassword(auth, $("a-email").value, $("a-pass").value); }
      catch(e) { $("auth-err").textContent = e.message; }
    }
    async function doRegister() {
      try {
        const name = $("a-name").value.trim();
        const c = await createUserWithEmailAndPassword(auth, $("a-email").value, $("a-pass").value);
        await updateProfile(c.user, { displayName: name });
      } catch(e) { $("auth-err").textContent = e.message; }
    }
    async function loginGoogle() {
      try { await signInWithPopup(auth, goog); }
      catch(e) { if($("auth-err")) $("auth-err").textContent = e.message; }
    }

    // ══════════════════════════════════════════
    //  APP SHELL
    // ══════════════════════════════════════════
    function renderApp() {
      const u = ME;
      document.body.innerHTML = `
      <!-- Mobile overlay for sidebar -->
      <div class="mob-overlay" id="mob-overlay" onclick="closeMobileSidebar()"></div>

      <div class="app">
        <!-- Mobile top bar -->
        <div class="mob-topbar">
          <button class="mob-menu-btn" onclick="toggleMobileSidebar()" aria-label="Menú">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span class="mob-logo">NEXUS</span>
          <button class="mob-post-btn" onclick="openPostModal()" aria-label="Nueva publicación">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <aside class="sidebar" id="sidebar">
          <div class="sidebar-logo">NEXUS</div>
          <nav class="sidebar-nav">
            <a class="nav-item" id="nav-feed" onclick="goView('feed');closeMobileSidebar()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Inicio
            </a>
            <a class="nav-item" id="nav-chat" onclick="goView('chat');closeMobileSidebar()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              Mensajes
            </a>
            <a class="nav-item" id="nav-communities" onclick="goView('communities');closeMobileSidebar()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v3M5 16l5-2M19 16l-5-2"/></svg>
              Comunidades
            </a>
            <a class="nav-item" id="nav-profile" onclick="goView('profile');closeMobileSidebar()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Mi Perfil
            </a>
          </nav>
          <button class="btn-new-post" onclick="openPostModal();closeMobileSidebar()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva Publicación
          </button>
          <div class="sidebar-user" onclick="goView('profile');closeMobileSidebar()">
            <div class="avatar sm" id="sb-av" style="${avStyle(u.photoURL)}">${avLetter(u.displayName||u.email, u.photoURL)}</div>
            <div style="flex:1;min-width:0">
              <div class="sb-name" id="sb-name">${esc(u.displayName||u.email)}</div>
              <div class="sb-email">${esc(u.email)}</div>
            </div>
            <button class="btn-logout" onclick="event.stopPropagation();doLogout()" title="Salir">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </div>
        </aside>

        <main class="main" id="main"></main>

        <!-- Mobile bottom nav -->
        <nav class="mob-bottom-nav">
          <a class="mob-nav-item" id="mobnav-feed" onclick="goView('feed')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Inicio</span>
          </a>
          <a class="mob-nav-item" id="mobnav-chat" onclick="goView('chat')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span>Mensajes</span>
          </a>
          <a class="mob-nav-item" id="mobnav-post" onclick="openPostModal()">
            <div class="mob-post-circle">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <span>Post</span>
          </a>
          <a class="mob-nav-item" id="mobnav-communities" onclick="goView('communities')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v3M5 16l5-2M19 16l-5-2"/></svg>
            <span>Comunidades</span>
          </a>
          <a class="mob-nav-item" id="mobnav-profile" onclick="goView('profile')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Perfil</span>
          </a>
        </nav>

        <!-- Post modal -->
        <div class="overlay" id="post-modal" style="display:none" onclick="if(event.target===this)closePostModal()">
          <div class="modal-box">
            <div class="modal-hd">
              <h3>Nueva Publicación</h3>
              <button class="btn-x" onclick="closePostModal()">✕</button>
            </div>
            <textarea class="txtarea" id="p-content" placeholder="¿Qué está pasando?" oninput="$('p-cc').textContent=this.value.length+'/500'"></textarea>
            <input class="inp" id="p-img" type="url" placeholder="URL de imagen (opcional)"/>
            <div class="modal-ft">
              <span class="subtle sm" id="p-cc">0/500</span>
              <button class="btn-primary" onclick="submitPost()">Publicar</button>
            </div>
          </div>
        </div>

        <!-- Follow modal -->
        <div class="overlay" id="follow-modal" style="display:none" onclick="if(event.target===this)closeFollowModal()">
          <div class="modal-box" style="max-height:70vh;overflow-y:auto">
            <div class="modal-hd">
              <h3 id="follow-modal-title">Seguidores</h3>
              <button class="btn-x" onclick="closeFollowModal()">✕</button>
            </div>
            <div id="follow-modal-list" style="margin-top:10px"></div>
          </div>
        </div>

        <!-- Create Circle Modal -->
        <div class="overlay" id="create-circle-modal" style="display:none" onclick="if(event.target===this)closeCreateCircleModal()">
          <div class="modal-box">
            <div class="modal-hd">
              <h3>✦ Crear Círculo</h3>
              <button class="btn-x" onclick="closeCreateCircleModal()">✕</button>
            </div>
            <label class="inp-label">Nombre del círculo *</label>
            <input class="inp" id="circle-name" placeholder="Ej: Amantes del diseño"/>
            <label class="inp-label">URL de imagen / portada</label>
            <input class="inp" id="circle-img" type="url" placeholder="https://i.imgur.com/..."/>
            <label class="inp-label">Descripción</label>
            <textarea class="txtarea" id="circle-desc" style="min-height:80px" placeholder="¿De qué trata este círculo?"></textarea>
            <label class="inp-label">Reglas del círculo</label>
            <textarea class="txtarea" id="circle-rules" style="min-height:70px" placeholder="Ej: 1. Respeto mutuo&#10;2. Sin spam"></textarea>
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:4px">
              <button class="btn-secondary" onclick="closeCreateCircleModal()">Cancelar</button>
              <button class="btn-primary" onclick="submitCircle()">Crear círculo</button>
            </div>
          </div>
        </div>
      </div>`;

      goView("feed");
    }

    function toggleMobileSidebar() {
      const sb = $("sidebar");
      const ov = $("mob-overlay");
      if(!sb) return;
      const open = sb.classList.toggle("mob-open");
      if(ov) ov.classList.toggle("visible", open);
    }
    function closeMobileSidebar() {
      const sb = $("sidebar");
      const ov = $("mob-overlay");
      if(sb) sb.classList.remove("mob-open");
      if(ov) ov.classList.remove("visible");
    }

    function goView(v) {
      view = v;
      chatPanelOpen = false;
      $("main")?.classList.remove("circle-mode");
      // sync desktop sidebar
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      const navKey = ["post-detail","other-profile"].includes(v) ? "feed" : v==="circle-room" ? "communities" : v;
      const ni = $(`nav-${navKey}`);
      if(ni) ni.classList.add("active");
      // sync mobile bottom nav
      document.querySelectorAll(".mob-nav-item").forEach(x=>x.classList.remove("active"));
      const mni = $(`mobnav-${navKey}`);
      if(mni) mni.classList.add("active");

      if(v==="feed")              renderFeed();
      else if(v==="chat")         renderChatView();
      else if(v==="profile")      renderMyProfile();
      else if(v==="communities")  renderCommunitiesView();
    }

    // ══════════════════════════════════════════
    //  FEED
    // ══════════════════════════════════════════
    function renderFeed() {
      inn("main", `
        <div class="page-hd">
          <h2>Descubrir</h2>
          <div class="tab-row">
            <button class="tab ${feedTab==="popular"?"active":""}" id="ft-popular" onclick="setFeedTab('popular')">🔥 Populares</button>
            <button class="tab ${feedTab==="recent"?"active":""}" id="ft-recent" onclick="setFeedTab('recent')">🕒 Recientes</button>
          </div>
        </div>
        <div id="posts-wrap"></div>`);
      loadFeed();
    }

    function setFeedTab(t) {
      feedTab = t;
      $(`ft-popular`)?.classList.toggle("active", t==="popular");
      $(`ft-recent`)?.classList.toggle("active", t==="recent");
      loadFeed();
    }

    function loadFeed() {
      if(!ME || view!=="feed") return;
      if(unsubFeed) unsubFeed();
      const col = collection(db,"posts");
      const q   = feedTab==="popular"
        ? query(col, orderBy("score","desc"), limit(60))
        : query(col, orderBy("createdAt","desc"), limit(60));
      unsubFeed = onSnapshot(q, snap => {
        if(!$("posts-wrap")) return;
        const posts = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(!posts.length){
          inn("posts-wrap",`<div class="empty"><div class="ei">🌌</div><p>Sin publicaciones aún. ¡Sé el primero!</p></div>`);
          return;
        }
        inn("posts-wrap", posts.map(postCard).join(""));
      });
    }

    function postCard(p) {
      const liked = (p.likes||[]).includes(ME.uid);
      const ts = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString("es",{day:"numeric",month:"short"}) : "";
      const mine = p.authorId===ME.uid;
      return `<div class="post-card" id="pc-${p.id}">
        <div class="post-hd">
          <div class="avatar" style="${avStyle(p.authorPhoto)}" onclick="visitProfile('${p.authorId}')">${avLetter(p.authorName, p.authorPhoto)}</div>
          <div style="flex:1;min-width:0">
            <div class="post-author" onclick="visitProfile('${p.authorId}')">${esc(p.authorName||"Anónimo")}</div>
            <div class="post-time">${ts}</div>
          </div>
          ${mine?`<button class="act-btn" style="padding:4px 8px;font-size:11px" onclick="deletePost('${p.id}')">🗑</button>`:""}
        </div>
        <div class="post-body">${esc(p.content||"")}</div>
        ${p.imageUrl?`<div class="post-img-wrap"><img src="${esc(p.imageUrl)}" onclick="openPost('${p.id}')" alt="" loading="lazy"/></div>`:""}
        <div class="post-actions">
          <button class="act-btn ${liked?"liked":""}" onclick="likePost('${p.id}',${liked})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="${liked?"currentColor":"none"}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            ${(p.likes||[]).length}
          </button>
          <button class="act-btn" onclick="openPost('${p.id}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            ${p.commentCount||0}
          </button>
          ${!mine?`<button class="act-btn" onclick="openChatWith('${p.authorId}','${esc(p.authorName||"Usuario")}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Mensaje
          </button>`:""}
        </div>
      </div>`;
    }

    async function deletePost(id) {
      if(!confirm("¿Eliminar publicación?")) return;
      await deleteDoc(doc(db,"posts",id));
    }

    async function likePost(id, liked) {
      await updateDoc(doc(db,"posts",id), {
        likes: liked ? arrayRemove(ME.uid) : arrayUnion(ME.uid),
        score: increment(liked ? -1 : 1)
      });
    }

    // ─── POST DETAIL ──────────────────────────────
    async function openPost(pid) {
      view = "post-detail";
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      $("nav-feed")?.classList.add("active");
      inn("main", `<div class="loader-txt">Cargando...</div>`);
      const snap = await getDoc(doc(db,"posts",pid));
      if(!snap.exists()){ inn("main","<p class='subtle'>Post no encontrado</p>"); return; }
      const p = {id:snap.id,...snap.data()};
      inn("main", `
        <button class="back-btn" onclick="goView('feed')">← Volver</button>
        ${postCard(p)}
        <div class="comments-box">
          <h4>Comentarios</h4>
          <div id="reply-cmt-banner" class="reply-cmt-banner" style="display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
            Respondiendo a <span class="reply-to-name"></span>
            <button class="cancel-reply-btn" onclick="cancelReply()">✕</button>
          </div>

            <div class="avatar sm" style="${avStyle(meData.photoURL||ME.photoURL)}">${avLetter(ME.displayName, meData.photoURL||ME.photoURL)}</div>
            <input class="inp" id="cmt-txt" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter')addComment('${pid}')"/>

    // Active reply-to-comment state: { id, authorName }
    let replyingToComment = null;

    function replyToComment(cmtId, authorName) {
      replyingToComment = { id: cmtId, authorName };
      const inp = $("cmt-txt");
      if(inp){
        inp.placeholder = "Respondiendo a @" + authorName + "...";
        inp.focus();
      }
      const banner = $("reply-cmt-banner");
      if(banner){
        banner.style.display = "flex";
        banner.querySelector(".reply-to-name").textContent = "@" + authorName;
      }
    }

    function cancelReply() {
      replyingToComment = null;
      const inp = $("cmt-txt");
      if(inp) inp.placeholder = "Escribe un comentario...";
      const banner = $("reply-cmt-banner");
      if(banner) banner.style.display = "none";
    }

    function loadComments(pid) {
      const q = query(collection(db,"posts",pid,"comments"), orderBy("createdAt","asc"));
      onSnapshot(q, snap => {
        if(!$("cmts-list")) return;
        const cs = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(!cs.length){ inn("cmts-list",`<p class="subtle" style="padding:16px 0">Sin comentarios aún.</p>`); return; }

        // Build a map: parentId -> replies
        const roots = cs.filter(c=>!c.parentId);
        const replies = cs.filter(c=>!!c.parentId);
        const replyMap = {};
        replies.forEach(r=>{ if(!replyMap[r.parentId]) replyMap[r.parentId]=[]; replyMap[r.parentId].push(r); });

        function renderCmt(c, isReply){
          const ts = c.createdAt ? new Date(c.createdAt.seconds*1000).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}) : "";
          return `<div class="cmt ${isReply?"cmt-reply":""}">
            <div class="avatar sm" style="${avStyle(c.authorPhoto)}" onclick="visitProfile('${c.authorId}')">${avLetter(c.authorName,c.authorPhoto)}</div>
            <div class="cmt-body-wrap">
              <div class="cmt-header">
                <span class="cmt-name" onclick="visitProfile('${c.authorId}')">${esc(c.authorName||"?")}</span>
                ${c.replyToName?`<span class="cmt-reply-tag">→ @${esc(c.replyToName)}</span>`:""}
                <span class="cmt-ts">${ts}</span>
              </div>
              <div class="cmt-text">${esc(c.content)}</div>
              <button class="cmt-reply-btn" onclick="replyToComment('${c.id}','${esc(c.authorName||"?")}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
                Responder
              </button>
            </div>
          </div>`;
        }

        inn("cmts-list", roots.map(c=>`
          ${renderCmt(c, false)}
          ${(replyMap[c.id]||[]).map(r=>renderCmt(r, true)).join("")}
        `).join(""));
      });
    }

    async function addComment(pid) {
      const inp = $("cmt-txt");
      const t   = inp?.value.trim();
      if(!t) return;
      inp.value = "";
      const data = {
        content: t,
        authorId: ME.uid,
        authorName: ME.displayName||ME.email,
        authorPhoto: meData.photoURL||ME.photoURL||"",
        createdAt: serverTimestamp()
      };
      if(replyingToComment){
        data.parentId     = replyingToComment.id;
        data.replyToName  = replyingToComment.authorName;
      }
      cancelReply();
      await addDoc(collection(db,"posts",pid,"comments"), data);
      await updateDoc(doc(db,"posts",pid), { commentCount: increment(1), score: increment(2) });
    }

    function openPostModal()  { show("post-modal"); }
    function closePostModal() { hide("post-modal"); }

      const content = $("p-content")?.value.trim();
      const imgUrl  = $("p-img")?.value.trim();
      if(!content) return;
      await addDoc(collection(db,"posts"), {
        content, imageUrl: imgUrl||"",

        authorName: ME.displayName||ME.email,
        authorPhoto: meData.photoURL||ME.photoURL||"",
        likes:[], commentCount:0, score:0,
        createdAt: serverTimestamp()
      });
      $("p-content").value = ""; $("p-img").value = "";
      closePostModal();
      feedTab = "recent";
      goView("feed");
    }

    // ══════════════════════════════════════════
    //  VISIT OTHER PROFILES  — FIX: no usa history.go(-1)

    async function visitProfile(uid) {
      if(!uid) return;
      if(uid===ME.uid){ goView("profile"); return; }
      view = "other-profile";
      document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
      inn("main", `<div class="loader-txt">Cargando perfil...</div>`);

      try {
        const [uSnap, meSnap] = await Promise.all([
          getDoc(doc(db,"users",uid)),
          getDoc(doc(db,"users",ME.uid))
        ]);
        if(!uSnap.exists()){ inn("main","<p class='subtle' style='padding:40px'>Usuario no encontrado</p>"); return; }
        const u  = uSnap.data();
        meData   = meSnap.data()||meData;
        const amF = (meData.following||[]).includes(uid);

        let posts = [];
        try {
          const postsSnap = await getDocs(query(collection(db,"posts"), where("authorId","==",uid), orderBy("createdAt","desc"), limit(30)));
          posts = postsSnap.docs.map(d=>({id:d.id,...d.data()}));
        } catch(e) { /* posts index may not exist */ }

        inn("main", `
          <button class="back-btn" onclick="goView('feed')">← Volver al inicio</button>
          <div class="profile-hero">
            <div class="avatar xl" style="${avStyle(u.photoURL)}">${avLetter(u.displayName||u.email, u.photoURL)}</div>
            <div class="profile-info">
              <h2>${esc(u.displayName||"Usuario")}</h2>
              <p class="profile-bio" style="margin-top:6px">${esc(u.bio||"Sin bio")}</p>
              <div class="follow-stats">
                <span class="follow-stat-btn" onclick="showFollowModal('${uid}','followers')"><strong id="fcount-${uid}">${(u.followers||[]).length}</strong> seguidores</span>
                <span class="follow-stat-btn" onclick="showFollowModal('${uid}','following')"><strong>${(u.following||[]).length}</strong> siguiendo</span>
              </div>
              <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
                ${amF
                  ? `<button id="follow-btn-${uid}" class="btn-secondary" onclick="unfollowUser('${uid}')">✓ Siguiendo</button>`
                  : `<button id="follow-btn-${uid}" class="btn-primary sm" onclick="followUser('${uid}')">+ Seguir</button>`}
                <button class="btn-secondary" onclick="openChatWith('${uid}','${esc(u.displayName||"Usuario")}')">💬 Mensaje privado</button>
              </div>
            </div>
          </div>
          <h4 style="margin:22px 0 12px;font-family:'Syne',sans-serif">Publicaciones</h4>
          ${posts.length ? posts.map(postCard).join("") : `<div class="empty"><p>Sin publicaciones aún</p></div>`}`);
      } catch(e) {
        inn("main", `<p class='subtle' style='padding:40px'>Error cargando perfil: ${esc(e.message)}</p>`);
      }
    }

    async function followUser(uid) {
      // Actualizar boton de inmediato (optimista)
      const btn = document.getElementById("follow-btn-" + uid);
      if(btn){ btn.disabled=true; btn.textContent="..."; }
      await Promise.all([
        updateDoc(doc(db,"users",ME.uid), { following: arrayUnion(uid) }),
        updateDoc(doc(db,"users",uid),    { followers: arrayUnion(ME.uid) })
      ]);
      meData.following = [...(meData.following||[]), uid];
      // Cambiar boton sin recargar pagina
      if(btn){
        btn.disabled=false;
        btn.className="btn-secondary";
        btn.textContent="✓ Siguiendo";
        btn.setAttribute("onclick","unfollowUser('"+uid+"')");
      }
      // Actualizar contador de seguidores en el DOM si existe
      const fcEl = document.getElementById("fcount-"+uid);
      if(fcEl){ const n=parseInt(fcEl.textContent||"0"); fcEl.textContent=n+1; }
    }
    async function unfollowUser(uid) {
      const btn = document.getElementById("follow-btn-" + uid);
      if(btn){ btn.disabled=true; btn.textContent="..."; }
      await Promise.all([
        updateDoc(doc(db,"users",ME.uid), { following: arrayRemove(uid) }),
        updateDoc(doc(db,"users",uid),    { followers: arrayRemove(ME.uid) })
      ]);
      meData.following = (meData.following||[]).filter(x=>x!==uid);
      if(btn){
        btn.disabled=false;
        btn.className="btn-primary sm";
        btn.textContent="+ Seguir";
        btn.setAttribute("onclick","followUser('"+uid+"')");
      }
      const fcEl = document.getElementById("fcount-"+uid);
      if(fcEl){ const n=parseInt(fcEl.textContent||"1"); fcEl.textContent=Math.max(0,n-1); }
    }

    async function showFollowModal(uid, type) {

    // ══════════════════════════════════════════
    //  CHAT — completamente reescrito
    //  Usa solo la colección "chats/" — compatible con las reglas de Firestore existentes.
    //  No hay chatRequests; el chat se crea directamente.
    //  El chat es en tiempo real con onSnapshot.
    // ══════════════════════════════════════════

    async function openChatWith(otherId, otherName) {
      if(!otherId || otherId===ME.uid) return;
      activeOtherId   = otherId;
      activeOtherName = otherName;
      const cid = chatId(ME.uid, otherId);

      // Verificar si el chat ya existe
      const chatSnap = await getDoc(doc(db,"chats",cid));

      if(!chatSnap.exists()) {
        // Obtener foto del otro usuario
        let otherPhoto = "";
        try {
          const otherSnap = await getDoc(doc(db,"users",otherId));
          if(otherSnap.exists()) otherPhoto = otherSnap.data().photoURL||"";
        } catch(e){}

        // Crear el chat directamente — sin solicitudes
        await setDoc(doc(db,"chats",cid), {
          members: [ME.uid, otherId],
          memberNames:  { [ME.uid]: ME.displayName||ME.email, [otherId]: otherName },
          memberPhotos: { [ME.uid]: meData.photoURL||ME.photoURL||"", [otherId]: otherPhoto },
          lastMessage: "",
          lastMessageAt: serverTimestamp(),
          createdAt: serverTimestamp()
        });
      }

      activeChatId = cid;
      goView("chat");
      // En móvil ir directo al panel de chat
      chatPanelOpen = true;
      renderChatView();
      // After render, activate panel-open
      setTimeout(()=>{ $("chat-layout")?.classList.add("panel-open"); }, 50);
    }

    function renderChatView() {
      inn("main", `
        <div class="chat-layout" id="chat-layout">
          <!-- Lista de chats (izq / pantalla completa en móvil cuando chatPanelOpen=false) -->
          <div class="chat-sidebar" id="chat-sb">
            <div class="chat-sb-hd">
              <h3>Mensajes</h3>
              <button class="btn-icon" onclick="openNewChatModal()" title="Buscar usuario">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div id="chat-list-wrap"><div class="loader-txt">Cargando chats...</div></div>
          </div>

          <!-- Panel de chat -->
          <div class="chat-main" id="chat-main">
            <div class="chat-empty">
              <div class="ei">💬</div>
              <p>Selecciona una conversación</p>
            </div>
          </div>
        </div>`);

      startListeningChats();
      if(activeChatId) openChatRoom(activeChatId, activeOtherName, activeOtherId);
    }

    // Escuchar chats en tiempo real con onSnapshot
    // Sin orderBy para evitar requerir indice compuesto; ordenamos en cliente.
    function startListeningChats() {
      if(unsubChats) unsubChats();
      const q = query(
        collection(db,"chats"),
        where("members","array-contains",ME.uid)
      );
      unsubChats = onSnapshot(q, snap => {
        const chats = snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>{
            const ta = a.lastMessageAt?.seconds ?? a.createdAt?.seconds ?? 0;
            const tb = b.lastMessageAt?.seconds ?? b.createdAt?.seconds ?? 0;
            return tb - ta;
          });
        // For each chat, listen to unread count
        chats.forEach(c => { listenUnread(c.id); });
        renderChatList(chats);
      }, err => {
        console.error("Chat list error:", err);
        const wrap = document.getElementById("chat-list-wrap");
        if(wrap) wrap.innerHTML = '<p style="padding:16px;font-size:12px;color:var(--subtle)">Error: ' + err.message + '</p>';
      });
    }

    const unreadListeners = {};
    function listenUnread(cid) {
      if(unreadListeners[cid]) return; // already listening
      const q = query(
        collection(db,"chats",cid,"messages"),
        where("senderId","!=",ME.uid)
      );
      unreadListeners[cid] = onSnapshot(q, snap => {
        const unread = snap.docs.filter(d => {
          const data = d.data();
          return !(data.readBy||[]).includes(ME.uid);
        }).length;
        // Only update if this chat isn't currently open
        if(cid !== activeChatId) {
          unreadCounts[cid] = unread;
        } else {
          unreadCounts[cid] = 0;
        }
        recalcTotalUnread();
        // Re-render chat list item badge
        updateChatItemBadge(cid, unreadCounts[cid]);
      }, ()=>{});
    }

    function updateChatItemBadge(cid, count) {
      const el = document.getElementById("ci-badge-"+cid);
      if(!el) return;
      el.textContent = count;
      el.style.display = count ? "" : "none";
      // Bold name if unread
      const nameEl = document.getElementById("ci-name-"+cid);
      if(nameEl) nameEl.style.fontWeight = count ? "800" : "600";
      // Dot indicator
      const dotEl = document.getElementById("ci-dot-"+cid);
      if(dotEl) dotEl.style.display = count ? "" : "none";
    }

    function formatChatTime(ts) {
      if(!ts) return "";
      const d = new Date(ts.seconds*1000);
      const now = new Date();
      const diff = now - d;
      if(diff < 60000) return "ahora";
      if(diff < 3600000) return Math.floor(diff/60000)+"m";
      if(diff < 86400000) return d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
      return d.toLocaleDateString("es",{day:"numeric",month:"short"});
    }

    function renderChatList(chats) {
      const wrap = $("chat-list-wrap");
      if(!wrap) return;
      if(!chats.length){
        wrap.innerHTML=`<p class="subtle" style="padding:16px;font-size:13px">Sin conversaciones aún.<br><br>Busca un usuario con el botón + o envía un mensaje desde una publicación.</p>`;
        return;
      }
      wrap.innerHTML = chats.map(c=>{
        const oid    = c.members.find(m=>m!==ME.uid);
        const oname  = c.memberNames?.[oid]||"Usuario";
        const ophoto = c.memberPhotos?.[oid]||"";
        const ts     = formatChatTime(c.lastMessageAt||c.createdAt);
        const unread = unreadCounts[c.id]||0;
        const hasUnread = unread > 0 && c.id !== activeChatId;
        return `<div class="chat-item ${activeChatId===c.id?"active":""} ${hasUnread?"has-unread":""}" onclick="selectChat('${c.id}','${esc(oname)}','${oid}')">
          <div style="position:relative;flex-shrink:0">
            <div class="avatar sm" style="${avStyle(ophoto)}">${avLetter(oname, ophoto)}</div>
            <span id="ci-dot-${c.id}" class="ci-unread-dot" style="display:${hasUnread?"":"none"}"></span>
          </div>
          <div class="chat-item-info">
            <div class="ci-name-row">
              <span id="ci-name-${c.id}" class="ci-name" style="font-weight:${hasUnread?"800":"600"}">${esc(oname)}</span>
              <span class="ci-time">${ts}</span>
            </div>
            <div class="ci-last-row">
              <span class="ci-last">${esc(c.lastMessage||"Iniciar conversación")}</span>
              <span id="ci-badge-${c.id}" class="ci-badge" style="display:${hasUnread?"":"none"}">${hasUnread?unread:""}</span>
            </div>
          </div>
        </div>`;
      }).join("");
    }

    // Llamado al hacer clic en un chat de la lista
    function selectChat(cid, oname, oid) {
      activeChatId    = cid;
      activeOtherName = oname;
      activeOtherId   = oid;
      chatPanelOpen   = true;
      $("chat-layout")?.classList.add("panel-open");
      openChatRoom(cid, oname, oid);
    }

    function showChatTab() {} // compatibilidad (ya no se usa)

    function backToChatList() {
      chatPanelOpen = false;
      activeChatId  = null;
      if(unsubMsgs){ unsubMsgs(); unsubMsgs=null; }
      $("chat-layout")?.classList.remove("panel-open");
      const chatMain = $("chat-main");
      if(chatMain) chatMain.innerHTML = `<div class="chat-empty"><div class="ei">💬</div><p>Selecciona una conversación</p></div>`;
    }

    async function openChatRoom(cid, oname, oid) {
      activeChatId    = cid;
      activeOtherName = oname;
      activeOtherId   = oid;
      if(unsubMsgs){ unsubMsgs(); unsubMsgs=null; }

      const chatMain = $("chat-main");
      if(!chatMain) return;

      // Obtener foto del otro usuario
      let otherPhoto = "";
      try {
        const otherSnap = await getDoc(doc(db,"users",oid));
        if(otherSnap.exists()) otherPhoto = otherSnap.data().photoURL||"";
      } catch(e){}

      replyingTo = null;
      chatMain.innerHTML = `
        <div class="chat-room-hd">
          <button class="back-btn-chat" onclick="backToChatList()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="avatar sm" style="${avStyle(otherPhoto)}" onclick="visitProfile('${oid}')">${avLetter(oname, otherPhoto)}</div>
          <span class="chat-room-name" onclick="visitProfile('${oid}')">${esc(oname)}</span>
        </div>
        <div class="msgs-list" id="msgs-list"><div class="loader-txt">Cargando mensajes...</div></div>
        <div id="msg-reply-preview" class="msg-reply-preview" style="display:none">
          <div class="mrp-inner">
            <div class="mrp-label">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
              <span id="mrp-name"></span>
            </div>
            <div id="mrp-text" class="mrp-text"></div>
          </div>
          <button class="cancel-reply-btn" onclick="cancelReplyMsg()">✕</button>
        </div>
        <div class="chat-inp-row">
          <input class="inp" id="msg-inp" placeholder="Escribe un mensaje..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage('${cid}')}"
            autocomplete="off"/>
          <button class="btn-send" onclick="sendMessage('${cid}')" aria-label="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>`;

      // Foco automático en input
      setTimeout(()=>{ const inp=$("msg-inp"); if(inp) inp.focus(); }, 100);

      // Escuchar mensajes en tiempo real
      const q = query(collection(db,"chats",cid,"messages"), orderBy("createdAt","asc"));
      unsubMsgs = onSnapshot(q, snap=>{
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
        renderMessages(msgs);
      }, err=>{
        console.error("Messages error:", err);
        const list=$("msgs-list");
        if(list) list.innerHTML=`<p class="subtle" style="padding:20px;text-align:center">Error al cargar mensajes. Verifica las reglas de Firestore.</p>`;
      });

      // Actualizar lista (marcar activo)
      startListeningChats();
    }

    function setReplyMsg(msgId, senderName, content) {
      replyingTo = { id: msgId, senderName, content };
      const preview = $("msg-reply-preview");
      if(preview){
        preview.style.display = "flex";
        $("mrp-name").textContent = senderName;
        $("mrp-text").textContent = content.length > 80 ? content.slice(0,80)+"…" : content;
      }
      $("msg-inp")?.focus();
    }

    function cancelReplyMsg() {
      replyingTo = null;
      const preview = $("msg-reply-preview");
      if(preview) preview.style.display = "none";
    }

    function renderMessages(msgs) {
      const list = $("msgs-list");
      if(!list) return;
      if(!msgs.length){
        list.innerHTML=`<p class="subtle" style="text-align:center;padding:40px">Di hola 👋<br><span style="font-size:12px">Sé el primero en escribir</span></p>`;
        return;
      }
      const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 60;

      // Mark received messages as read
      const cid = activeChatId;
      const unreadMsgs = msgs.filter(m => m.senderId !== ME.uid && !m.readBy?.includes(ME.uid));
      if(unreadMsgs.length && cid){
        unreadMsgs.forEach(m => {
          updateDoc(doc(db,"chats",cid,"messages",m.id), {
            readBy: arrayUnion(ME.uid)
          }).catch(()=>{});
        });
        // Reset local unread for this chat
        unreadCounts[cid] = 0;
        recalcTotalUnread();
      }

      list.innerHTML = msgs.map(m=>{
        const mine = m.senderId===ME.uid;
        const ts   = m.createdAt ? new Date(m.createdAt.seconds*1000).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}) : "";
        const replyHTML = m.replyTo ? `
          <div class="msg-quoted">
            <span class="msg-quoted-name">${esc(m.replyTo.senderName)}</span>
            <span class="msg-quoted-text">${esc(m.replyTo.content.length>80?m.replyTo.content.slice(0,80)+"…":m.replyTo.content)}</span>
          </div>` : "";
        const safeContent = esc(m.content||"");
        const safeSender  = esc(m.senderName||"");
        const safeId      = m.id||"";
        return `<div class="msg ${mine?"mine":"theirs"}" id="msg-${safeId}">
          <div class="bubble">
            ${replyHTML}
            <div class="bubble-text">${safeContent}</div>
          </div>
          <div class="msg-footer">
            <span class="msg-ts">${ts}</span>
            <button class="msg-reply-btn" onclick="setReplyMsg('${safeId}','${safeSender}','${safeContent.replace(/'/g,"\\'")}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
            </button>
          </div>
        </div>`;
      }).join("");
      if(wasAtBottom) list.scrollTop = list.scrollHeight;
    }

    function recalcTotalUnread() {
      totalUnread = Object.values(unreadCounts).reduce((s,n)=>s+n,0);
      updateUnreadBadge();
    }

    function updateUnreadBadge() {
      // Desktop sidebar badge (nav-chat)
      let badge = $("chat-nav-badge");
      if(!badge){
        const navChat = $("nav-chat");
        if(navChat){
          badge = document.createElement("span");
          badge.id = "chat-nav-badge";
          badge.className = "badge";
          navChat.appendChild(badge);
        }
      }
      if(badge){ badge.textContent = totalUnread; badge.style.display = totalUnread ? "" : "none"; }
      // Mobile bottom nav badge
      let mbadge = $("mob-chat-badge");
      if(!mbadge){
        const mobChat = $("mobnav-chat");
        if(mobChat){
          mbadge = document.createElement("span");
          mbadge.id = "mob-chat-badge";
          mbadge.className = "mob-badge";
          mobChat.style.position = "relative";
          mobChat.appendChild(mbadge);
        }
      }
      if(mbadge){ mbadge.textContent = totalUnread; mbadge.style.display = totalUnread ? "" : "none"; }
    }

    // ── FIX PRINCIPAL: sendMessage sin verificación de "accepted" ──
    async function sendMessage(cid) {
      const inp = $("msg-inp");
      const t   = inp?.value.trim();
      if(!t || !cid) return;

      inp.value = "";
      inp.focus();

      const msgData = {
        content: t,
        senderId: ME.uid,
        senderName: ME.displayName||ME.email,
        readBy: [ME.uid],
        createdAt: serverTimestamp()
      };
      if(replyingTo) {
        msgData.replyTo = { id: replyingTo.id, senderName: replyingTo.senderName, content: replyingTo.content };
      }
      cancelReplyMsg();
      try {
        await addDoc(collection(db,"chats",cid,"messages"), msgData);
        await updateDoc(doc(db,"chats",cid), {
          lastMessage: t,
          lastMessageAt: serverTimestamp()
        });
      } catch(e) {
        console.error("sendMessage error:", e);
        inp.value = t;
        alert("Error al enviar: " + e.message);
      }
    }

    async function openNewChatModal() {
      const email = prompt("Correo del usuario al que quieres escribir:");
      if(!email) return;
      const q = query(collection(db,"users"), where("email","==",email.trim().toLowerCase()));
      const snap = await getDocs(q);
      if(snap.empty){ alert("Usuario no encontrado"); return; }
      const other = snap.docs[0].data();
      if(other.uid===ME.uid){ alert("¡Ese eres tú!"); return; }
      await openChatWith(other.uid, other.displayName||other.email);
    }

    async function saveProfile() {
      const name  = $("e-name")?.value.trim();
      const bio   = $("e-bio")?.value.trim();
      const photo = $("e-photo")?.value.trim();
      if(!name){ alert("El nombre no puede estar vacío"); return; }
      try {
        await updateProfile(ME, { displayName: name, photoURL: photo||"" });
        await updateDoc(doc(db,"users",ME.uid), { displayName: name, bio: bio||"", photoURL: photo||"" });
        meData.displayName = name; meData.bio = bio; meData.photoURL = photo||"";
        set("sb-name", name);

        }
        alert("Perfil actualizado ✓");

    function renderCircleMessages(msgs) {
      const list = $("circle-msgs");
      if(!list) return;
      if(!msgs.length){
        list.innerHTML=`<p class="subtle" style="text-align:center;padding:40px">Sé el primero en escribir 👋</p>`;
        return;
      }
      const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 80;
      list.innerHTML = msgs.map(m=>{
        const mine = m.senderId===ME.uid;
        const ts = m.createdAt ? new Date(m.createdAt.seconds*1000).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}) : "";
        const replyHTML = m.replyTo ? `
          <div class="msg-quoted">
            <span class="msg-quoted-name">${esc(m.replyTo.senderName)}</span>
            <span class="msg-quoted-text">${esc(m.replyTo.content.length>80?m.replyTo.content.slice(0,80)+"…":m.replyTo.content)}</span>
          </div>` : "";
        const safeContent = esc(m.content||"");
        const safeSender  = esc(m.senderName||"");
        const safeId      = m.id||"";
        return `<div class="msg ${mine?"mine":"theirs"}" id="cmsg-${safeId}">
          ${!mine?`<div class="avatar sm" style="${avStyle(m.senderPhoto)}" onclick="visitProfile('${m.senderId}')">${avLetter(m.senderName,m.senderPhoto)}</div>`:""}
          <div style="display:flex;flex-direction:column;${mine?"align-items:flex-end":"align-items:flex-start"}">
            ${!mine?`<span style="font-size:11px;color:var(--subtle);margin-bottom:3px;cursor:pointer" onclick="visitProfile('${m.senderId}')">${safeSender}</span>`:""}
            <div class="bubble">
              ${replyHTML}
              <div class="bubble-text">${safeContent}</div>
            </div>
            <div class="msg-footer">
              <span class="msg-ts">${ts}</span>
              <button class="msg-reply-btn" onclick="setCircleReplyMsg('${safeId}','${safeSender}','${safeContent.replace(/'/g,"\\'")}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 00-4-4H4"/></svg>
              </button>
            </div>
          </div>
        </div>`;
      }).join("");
      if(wasAtBottom) list.scrollTop = list.scrollHeight;
    }

    function setCircleReplyMsg(msgId, senderName, content) {
      circleReplyingTo = { id: msgId, senderName, content };
      const preview = $("circle-reply-preview");
      if(preview){
        preview.style.display = "flex";
        $("crp-name").textContent = senderName;
        $("crp-text").textContent = content.length>80 ? content.slice(0,80)+"…" : content;
      }
    }

    function cancelCircleReplyMsg() {
      circleReplyingTo = null;
      const p = $("circle-reply-preview");
      if(p) p.style.display="none";
    }

    async function sendCircleMessage() {
      const inp = $("circle-msg-inp");
      const t = inp?.value.trim();
      if(!t || !activeCircleId) return;
      inp.value = "";
      const msgData = {
        content: t,
        senderId: ME.uid,
        senderName: ME.displayName||ME.email,
        senderPhoto: meData.photoURL||ME.photoURL||"",
        createdAt: serverTimestamp()
      };
      if(circleReplyingTo) {
        msgData.replyTo = { id: circleReplyingTo.id, senderName: circleReplyingTo.senderName, content: circleReplyingTo.content };
      }
      cancelCircleReplyMsg();
      try {
        await addDoc(collection(db,"circles",activeCircleId,"messages"), msgData);
        await updateDoc(doc(db,"circles",activeCircleId), { lastMessage: t, lastMessageAt: serverTimestamp() });
      } catch(e) {
        console.error("Circle message error:", e);
        inp.value = t;
        alert("Error al enviar: " + e.message);
      }
    }

    async function doLogout() {
      if(unsubFeed) unsubFeed();
      if(unsubMsgs) unsubMsgs();
      if(unsubChats) unsubChats();
      await signOut(auth);
    }
  </script>

    .msg-reply-preview { display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--s2); border-top:1px solid var(--border); border-left:3px solid var(--accent); }
    .mrp-inner { flex:1; min-width:0; }
    .mrp-label { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--accent); font-weight:600; margin-bottom:2px; }
    .mrp-text { font-size:12px; color:var(--subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .msg-quoted { background:rgba(255,255,255,.06); border-left:3px solid rgba(255,255,255,.3); border-radius:6px; padding:5px 8px; margin-bottom:6px; }
    .mine .msg-quoted { background:rgba(0,0,0,.15); border-left-color:rgba(255,255,255,.5); }
    .msg-quoted-name { display:block; font-size:10px; font-weight:700; margin-bottom:2px; opacity:.9; }
    .msg-quoted-text { display:block; font-size:11px; opacity:.75; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
    .bubble-text { }
    .msg-footer { display:flex; align-items:center; gap:6px; margin-top:3px; }
    .msg-reply-btn { background:none; border:none; color:var(--subtle); cursor:pointer; padding:2px 4px; border-radius:4px; opacity:0; transition:opacity .15s,color .15s; display:flex; align-items:center; }
    .msg:hover .msg-reply-btn { opacity:1; }
    .msg-reply-btn:hover { color:var(--accent); }

    /* ─── CHAT LIST UNREAD ───────────────────── */
    .chat-item.has-unread { background:rgba(124,77,255,.07); }
    .chat-item.has-unread:hover { background:rgba(124,77,255,.14); }
    .ci-unread-dot { position:absolute; bottom:0; right:0; width:11px; height:11px; background:var(--accent); border-radius:50%; border:2px solid var(--bg); }
    .ci-name-row { display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:2px; }
    .ci-last-row { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .ci-badge { background:var(--accent); color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; border-radius:9px; padding:0 5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .mob-badge { position:absolute; top:-4px; right:-2px; background:var(--danger); color:#fff; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:8px; padding:0 4px; display:flex; align-items:center; justify-content:center; }
    .badge { background:var(--danger); color:#fff; font-size:10px; padding:1px 5px; border-radius:20px; position:absolute; right:10px; }

    /* ─── CIRCLES / COMMUNITIES ──────────────── */
    .circle-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:16px; transition:border-color .2s; }
    .circle-card:hover { border-color:rgba(124,77,255,.4); }
    .circle-cover { height:130px; position:relative; cursor:pointer; }
    .circle-cover-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.1) 60%); }
    .circle-cover-info { position:absolute; bottom:12px; left:14px; right:14px; }
    .circle-card-name { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5); }
    .circle-card-members { display:flex; align-items:center; gap:5px; font-size:12px; color:rgba(255,255,255,.75); margin-top:4px; }
    .circle-card-body { padding:14px; }
    .circle-card-desc { font-size:13px; color:var(--subtle); line-height:1.5; margin-bottom:4px; }

    /* Circle Room — chat layout */
    .circle-chat-layout { display:flex; flex-direction:column; height:calc(100vh - 48px); overflow:hidden; }
    .circle-room-hd { height:72px; flex-shrink:0; position:relative; background-size:cover; background-position:center; }
    .circle-room-hd-overlay { position:absolute; inset:0; background:linear-gradient(to right, rgba(0,0,0,.78) 0%, rgba(0,0,0,.45) 100%); display:flex; align-items:center; gap:10px; padding:0 14px; }
    .circle-room-name { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 6px rgba(0,0,0,.5); }
    .circle-info-btn { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); color:#fff; width:34px; height:34px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
    .circle-info-btn:hover { background:rgba(255,255,255,.25); }
    .circle-chat-layout .msgs-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }

    /* Info overlay / drawer */
    .circle-info-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:500; align-items:center; justify-content:flex-end; }
    .circle-info-drawer { width:320px; max-width:100%; height:100%; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; animation:slideInRight .25s ease; }
    @keyframes slideInRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
    .circle-info-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; }
    .circle-members-list { display:flex; flex-direction:column; gap:4px; }
    .circle-member-item { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px; cursor:pointer; transition:background .2s; }
    .circle-member-item:hover { background:var(--s2); }

    @media (max-width:768px) {
      .circle-chat-layout { height:calc(100vh - var(--mob-topbar-h) - var(--mob-bottomnav-h)); }
      .circle-info-drawer { width:100%; border-left:none; border-top:1px solid var(--border); height:85vh; border-radius:18px 18px 0 0; }
      .circle-info-overlay { align-items:flex-end; justify-content:center; }
    }

    /* ══════════════════════════════════════════
       RESPONSIVE — MOBILE
       ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      /* Show mobile bars */
      .mob-topbar    { display:flex; }
      .mob-bottom-nav{ display:flex; }

      /* Offset content for fixed bars */
      .main {
        padding-top: calc(var(--mob-topbar-h) + 16px);
        padding-bottom: calc(var(--mob-bottomnav-h) + 16px);
        padding-left: 14px;
        padding-right: 14px;
        max-height: 100vh;
      }

      /* Sidebar becomes slide-in drawer */
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 300;
        width: 260px;
        transform: translateX(-100%);
        padding-top: 20px;
      }
      .sidebar.mob-open { transform: translateX(0); }
      .sidebar-logo { margin-bottom: 16px; }

      /* Chat view becomes full-screen panels */
      .chat-layout {
        height: calc(100vh - var(--mob-topbar-h) - var(--mob-bottomnav-h));
        position: relative;
      }

      /* On mobile, sidebar takes full width */
      .chat-sidebar {
        position: absolute;
        inset: 0;
        width: 100%;
        border-right: none;
        z-index: 1;
      }
      .chat-sidebar.mob-hidden { display: none; }

      /* Chat main panel takes full width */
      .chat-main {
        position: absolute;
        inset: 0;
        width: 100%;
        z-index: 2;
        background: var(--bg);
        /* Hidden by default on mobile unless activated */
        display: none;
      }
      /* Show chat panel when a chat is active */
      .chat-main.chat-main-desktop-show { display: none; }

      /* back-btn-chat visible on mobile */
      .back-btn-chat { display: flex; }

      /* Post card padding */
      .post-card { padding: 14px; }
      .post-actions { gap: 5px; }
      .act-btn { padding: 5px 10px; font-size: 11px; }

      /* Profile */
      .profile-hero { gap: 14px; }
      .profile-info h2 { font-size: 18px; }

      /* Hide page-hd title if too big */
      .page-hd h2 { font-size: 22px; }
    }

    /* When chat panel is open on mobile — show it, hide list */
    @media (max-width: 768px) {
      .chat-layout.panel-open .chat-sidebar { display: none; }
      .chat-layout.panel-open .chat-main    { display: flex; }
    }

    @media (min-width: 769px) {
      /* Desktop: always show both panels */
      .chat-main { display: flex !important; }
      .chat-sidebar { display: flex !important; }
      .back-btn-chat { display: none; }
      .mob-overlay { display: none !important; }
    }

    /* Small phones */
    @media (max-width: 380px) {
      .post-card { padding: 12px; }
      .act-btn { padding: 5px 8px; gap: 4px; }
      .avatar.xl { width: 54px; height: 54px; font-size: 18px; }
    }
  </style>
